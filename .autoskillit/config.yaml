test_check:
  command: ["task", "test-all"]
  filter_mode: "conservative"
  base_ref: "develop"
  # timeout: 600

safety:
  reset_guard_marker: ".autoskillit-workspace"
  require_dry_walkthrough: true
  test_gate_on_merge: true

# --- Advanced settings (uncomment and configure as needed) ---
