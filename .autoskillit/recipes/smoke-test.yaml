name: smoke-test
autoskillit_version: "0.7.31"
description: >-
  Lightweight end-to-end sanity check — creates an isolated branch and worktree,
  implements a trivial micro-task (smoke_canary), runs the full project test suite,
  opens a GitHub PR, and immediately closes it without merging.
summary: >-
  create_branch > create_worktree > setup_worktree > implement_task > test >
  push_branch > create_pr > close_pr > cleanup > done

ingredients:
  workspace:
    description: >-
      Path to the git repository workspace. Must have a GitHub remote configured
      and an authenticated gh CLI available.
    required: true
  base_branch:
    description: Base branch for the PR target
    default: main

kitchen_rules:
  - >-
    NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the orchestrator. All file
    operations are delegated through run_skill or run_cmd.
  - >-
    Route to escalate or fail_cleanup on any failure — never investigate or fix
    directly from the orchestrator. This is a sanity check, not a stress test:
    no retries, no fix loops.

steps:
  create_branch:
    tool: create_unique_branch
    with:
      base_branch_name: "smoke/canary"
      cwd: "${{ inputs.workspace }}"
      step_name: "create_branch"
    capture:
      branch_name: "${{ result.branch_name }}"
    on_success: create_worktree
    on_failure: escalate
    note: >-
      Creates a unique smoke/canary[-N] branch (collision-safe via ls-remote).
      Routes to escalate on failure — no worktree exists yet, nothing to clean up.

  create_worktree:
    tool: run_cmd
    with:
      cmd: >-
        WORKTREE="${{ inputs.workspace }}/.autoskillit/worktrees/smoke-canary" &&
        git worktree add "$WORKTREE" "${{ context.branch_name }}" &&
        printf '%s' "$WORKTREE"
      cwd: "${{ inputs.workspace }}"
      step_name: "create_worktree"
    capture:
      worktree_path: "${{ result.stdout }}"
    on_success: setup_worktree
    on_failure: fail_cleanup
    note: >-
      Creates the worktree at a deterministic path under .autoskillit/worktrees/.
      Captures worktree_path for all subsequent steps. On failure, routes to
      fail_cleanup which handles branch deletion even when the worktree was not created.

  setup_worktree:
    tool: run_cmd
    with:
      cmd: "task install-worktree"
      cwd: "${{ context.worktree_path }}"
      step_name: "setup_worktree"
    on_success: implement_task
    on_failure: fail_cleanup

  implement_task:
    tool: run_skill
    with:
      skill_command: >-
        /autoskillit:smoke-task In ${{ context.worktree_path }}: (1) open
        src/autoskillit/smoke_utils.py and append a blank line followed by the
        function 'def smoke_canary() -> bool:' with body
        '    """Smoke-test sentinel — always returns True."""' and '    return True';
        (2) create tests/test_smoke_canary.py containing exactly:
        'from autoskillit.smoke_utils import smoke_canary' blank line blank line
        'def test_smoke_canary() -> None:' '    assert smoke_canary() is True';
        (3) run git add src/autoskillit/smoke_utils.py tests/test_smoke_canary.py;
        (4) run git commit -m 'smoke: add smoke_canary()'.
      cwd: "${{ context.worktree_path }}"
    on_success: test
    on_failure: fail_cleanup
    note: >-
      REQ-TASK-001 + REQ-TASK-002: Trivial, fully-specified micro-task. No retries —
      a failure here is an infrastructure signal, not a logic problem.

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
      step_name: "test"
    on_success: push_branch
    on_failure: fail_cleanup
    note: >-
      REQ-PIPE-002: Runs the full project test suite in the worktree.
      smoke_canary() is now defined and tests/test_smoke_canary.py passes alongside
      the existing suite. Routes to fail_cleanup on failure — no retry loop.

  push_branch:
    tool: run_cmd
    with:
      cmd: "git push -u origin ${{ context.branch_name }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "push_branch"
    on_success: create_pr
    on_failure: fail_cleanup

  create_pr:
    tool: run_cmd
    with:
      cmd: >-
        gh pr create
          --title "smoke: add smoke_canary() [DO NOT MERGE]"
          --body "Automated smoke-test PR — closed without merging. Safe to ignore."
          --base "${{ inputs.base_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "create_pr"
    on_success: close_pr
    on_failure: fail_cleanup
    note: >-
      REQ-PIPE-003: Creates the PR. Does not capture the URL because close_pr
      uses 'gh pr view' on the worktree branch to locate the PR.

  close_pr:
    tool: run_cmd
    with:
      cmd: >-
        PR_NUM=$(gh pr view --json number --jq .number) &&
        gh pr close "$PR_NUM" --comment "Smoke test complete. Closing without merge."
      cwd: "${{ context.worktree_path }}"
      step_name: "close_pr"
    on_success: cleanup
    on_failure: cleanup
    note: >-
      REQ-PIPE-004: Closes the PR without merging. Uses gh pr view on the current
      branch to find the PR number. Routes to cleanup on BOTH success and failure —
      cleanup is always required (REQ-GUARD-002).

  cleanup:
    tool: run_cmd
    with:
      cmd: >-
        git worktree remove "${{ context.worktree_path }}" --force 2>/dev/null || true &&
        git push origin --delete "${{ context.branch_name }}" 2>/dev/null || true &&
        git branch -D "${{ context.branch_name }}" 2>/dev/null || true
      cwd: "${{ inputs.workspace }}"
      step_name: "cleanup"
    on_success: done
    on_failure: done
    note: >-
      REQ-PIPE-005 + REQ-GUARD-002: Best-effort cleanup — worktree remove, remote branch
      delete, local branch delete. || true guards ensure partial cleanup does not fail
      the step. Routes to done regardless so cleanup errors do not mask success.

  fail_cleanup:
    tool: run_cmd
    with:
      cmd: >-
        git worktree remove "${{ context.worktree_path }}" --force 2>/dev/null || true &&
        git push origin --delete "${{ context.branch_name }}" 2>/dev/null || true &&
        git branch -D "${{ context.branch_name }}" 2>/dev/null || true
      cwd: "${{ inputs.workspace }}"
      step_name: "fail_cleanup"
    on_success: escalate
    on_failure: escalate
    note: >-
      REQ-GUARD-002 (failure path): Same cleanup as 'cleanup' but routes to escalate
      to preserve failure semantics. context.worktree_path may be empty if create_worktree
      failed — the || true guards handle this gracefully.

  done:
    action: stop
    message: "Smoke test completed successfully — PR created and closed without merging."

  escalate:
    action: stop
    message: "Smoke test failed — check step output for details."
