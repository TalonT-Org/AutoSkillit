# Test Filter Manifest
#
# Maps non-Python file glob patterns (repo-relative) to test directories
# (relative to tests/). Used by _test_filter.py to select which tests
# to run when non-Python files change.
#
# Files already handled by Bucket A (pyproject.toml, uv.lock, conftest.py)
# are intentionally absent — Bucket A triggers a full run before the
# manifest is consulted.

src/autoskillit/recipes/*.yaml:
  - recipe/
  - contracts/

src/autoskillit/recipes/examples/*.yaml:
  - recipe/

src/autoskillit/recipes/sub-recipes/*.yaml:
  - recipe/

src/autoskillit/recipes/diagrams/*.md:
  - recipe/

src/autoskillit/recipes/contracts/*.yaml:
  - recipe/
  - contracts/

src/autoskillit/recipes/experiment-types/*.yaml:
  - recipe/

src/autoskillit/recipe/skill_contracts.yaml:
  - contracts/
  - skills/
  - recipe/
  - execution/

src/autoskillit/recipe/block_budgets.yaml:
  - recipe/

src/autoskillit/skills/*/SKILL.md:
  - skills/
  - contracts/

src/autoskillit/skills_extended/*/SKILL.md:
  - skills/
  - contracts/
  - recipe/
  - skills_extended/

src/autoskillit/config/defaults.yaml:
  - config/
  - infra/
  - docs/
  - workspace/

src/autoskillit/hooks/registry.sha256:
  - infra/

src/autoskillit/.claude-plugin/plugin.json:
  - contracts/
  - server/
  - cli/
  - test_version.py

src/autoskillit/migrations/*.yaml:
  - migration/

.github/workflows/*.yml:
  - infra/

CLAUDE.md:
  - infra/
  - contracts/
  - docs/

Taskfile.yml:
  - infra/

.gitattributes:
  - infra/

.gitleaks.toml:
  - infra/

docs/**/*.md:
  - docs/

README.md:
  - docs/

src/autoskillit/assets/**/*:
  - assets/

tests/recipe/fixtures/*:
  - recipe/

# Local .autoskillit/ config and state files
.autoskillit/test-source-map.json:
  - infra/

.autoskillit/config.yaml:
  - infra/

.autoskillit/test-filter-manifest.yaml:
  - infra/

.autoskillit/recipes/*.yaml:
  - recipe/

.autoskillit/recipes/contracts/*.yaml:
  - recipe/
  - contracts/

.autoskillit/recipes/diagrams/*.md:
  - recipe/

# External skills installed under .claude/skills/
.claude/skills/*/SKILL.md:
  - skills/
  - contracts/

# Root config / tooling files
.gitignore:
  - infra/

.python-version:
  - infra/

install.sh:
  - infra/
  - cli/

scripts/verify-test-filter.sh:
  - infra/

scripts/benchmark-testmon.py:
  - infra/

# Source non-Python files
src/autoskillit/.mcp.json:
  - server/
  - cli/

src/autoskillit/recipes/sub-recipes/diagrams/*.md:
  - recipe/
