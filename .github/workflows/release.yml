name: Release — Minor Version Bump and Tag

on:
  pull_request:
    types: [closed]
    branches: [stable]

jobs:
  release:
    permissions:
      contents: write
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: stable
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Compute new minor version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$((MINOR + 1)).0"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          python3 - <<'EOF'
          import pathlib, os
          p = pathlib.Path("pyproject.toml")
          old_ver = f'version = "{os.environ["OLD_VERSION"]}"'
          new_ver = f'version = "{os.environ["NEW_VERSION"]}"'
          p.write_text(p.read_text().replace(old_ver, new_ver, 1))
          EOF
        env:
          OLD_VERSION: ${{ steps.version.outputs.old }}
          NEW_VERSION: ${{ steps.version.outputs.new }}

      - name: Sync plugin.json and recipe versions
        run: python3 scripts/sync_versions.py

      - name: Regenerate uv.lock
        run: uv lock

      - name: Commit and push version bump to stable
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json src/autoskillit/recipes/ uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
            git push origin stable
          fi

      - name: Create annotated git tag
        run: |
          set -euo pipefail
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target stable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
