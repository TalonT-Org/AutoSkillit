name: Tests

on:
  push:
    branches: [main, integration]
  pull_request:

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      os-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Compute OS matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "integration" ]] || \
             [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/integration" ]]; then
            echo 'matrix=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["ubuntu-latest","macos-15"]' >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Report tool versions
        run: |
          echo "uv: $(uv --version)"
          uv run python --version

  test:
    name: Test on ${{ matrix.os }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.preflight.outputs.os-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: "3.43.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show environment
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "uv: $(uv --version)"
          echo "task: $(task --version)"
          uv run python --version

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: task test-all
