name: Tests

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, integration, stable]
  merge_group:

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      os-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Compute OS matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "stable" ]] || \
             [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/stable" ]]; then
            echo 'matrix=["ubuntu-latest","macos-15"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Report tool versions
        run: |
          echo "uv: $(uv --version)"
          uv run python --version

  test:
    name: Test on ${{ matrix.os }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.preflight.outputs.os-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: "3.43.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show environment
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "uv: $(uv --version)"
          echo "task: $(task --version)"
          uv run python --version

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.GH_USER }}:${{ secrets.GH_PAT }}@github.com/TalonT-Org/".insteadOf "https://github.com/TalonT-Org/"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Generate hooks.json
        run: |
          uv run python -c "
          from autoskillit.hooks import generate_hooks_json
          from autoskillit.core.io import atomic_write
          from autoskillit.core.paths import pkg_root
          import json
          path = pkg_root() / 'hooks' / 'hooks.json'
          atomic_write(path, json.dumps(generate_hooks_json(), indent=2) + '\n')
          print(f'Generated: {path}')
          "

      - name: Generate recipe diagrams
        run: uv run autoskillit recipes render

      - name: Run tests
        run: task test-all
