name: Auto Patch Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-sync:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'integration'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Compute new patch version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_bytes())['project']['version'])
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          python3 - <<'EOF'
          import pathlib, os
          p = pathlib.Path("pyproject.toml")
          old_ver = f'version = "{os.environ["OLD_VERSION"]}"'
          new_ver = f'version = "{os.environ["NEW_VERSION"]}"'
          p.write_text(p.read_text().replace(old_ver, new_ver, 1))
          EOF
        env:
          OLD_VERSION: ${{ steps.version.outputs.old }}
          NEW_VERSION: ${{ steps.version.outputs.new }}

      - name: Update plugin.json
        run: |
          python3 - <<'EOF'
          import json, pathlib, os
          p = pathlib.Path("src/autoskillit/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["NEW_VERSION"]
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}

      - name: Regenerate uv.lock
        run: uv lock

      - name: Commit and push version bump to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
            git push origin main
          fi

      - name: Force-push integration to match main
        run: |
          set -euo pipefail
          git fetch origin main
          git push --force origin origin/main:refs/heads/integration
