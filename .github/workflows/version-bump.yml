name: Auto Minor Version Bump on Promotion

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  minor-bump-on-promote:
    permissions:
      contents: write
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'integration'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Compute new minor version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_MAIN="$MAJOR.$((MINOR + 1)).0"
          NEW_INT="$MAJOR.$((MINOR + 1)).1"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_main=$NEW_MAIN" >> "$GITHUB_OUTPUT"
          echo "new_int=$NEW_INT" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml (main)
        run: |
          python3 - <<'EOF'
          import pathlib, os
          p = pathlib.Path("pyproject.toml")
          old_ver = f'version = "{os.environ["OLD_VERSION"]}"'
          new_ver = f'version = "{os.environ["NEW_VERSION"]}"'
          p.write_text(p.read_text().replace(old_ver, new_ver, 1))
          EOF
        env:
          OLD_VERSION: ${{ steps.version.outputs.old }}
          NEW_VERSION: ${{ steps.version.outputs.new_main }}

      - name: Update plugin.json (main)
        run: |
          python3 - <<'EOF'
          import json, pathlib, os
          p = pathlib.Path("src/autoskillit/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["NEW_VERSION"]
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_main }}

      - name: Regenerate uv.lock (main)
        run: uv lock

      - name: Commit and push version bump to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_main }}"
            git push origin main
          fi

      - name: Checkout integration branch
        run: |
          set -euo pipefail
          git fetch origin integration
          git checkout -B integration origin/integration

      - name: Read integration current version
        id: int_version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          [ -n "$CURRENT" ] || { echo "ERROR: int_version: CURRENT is empty — checkout may have failed or pyproject.toml is absent" >&2; exit 1; }
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml (integration)
        run: |
          python3 - <<'EOF'
          import pathlib, os, sys
          p = pathlib.Path("pyproject.toml")
          old_str = os.environ["OLD_VERSION"]
          new_str = os.environ["NEW_VERSION"]
          old_parts = tuple(int(x) for x in old_str.split("."))
          new_parts = tuple(int(x) for x in new_str.split("."))
          if new_parts <= old_parts:
              print(f"ERROR: new_int {new_str!r} would downgrade integration from {old_str!r}", file=sys.stderr)
              sys.exit(1)
          old_ver = f'version = "{old_str}"'
          new_ver = f'version = "{new_str}"'
          old_content = p.read_text()
          new_content = old_content.replace(old_ver, new_ver, 1)
          if new_content == old_content:
              print(f"ERROR: version pattern {old_ver!r} not found in pyproject.toml", file=sys.stderr)
              sys.exit(1)
          p.write_text(new_content)
          EOF
        env:
          OLD_VERSION: ${{ steps.int_version.outputs.old }}
          NEW_VERSION: ${{ steps.version.outputs.new_int }}

      - name: Update plugin.json (integration)
        run: |
          python3 - <<'EOF'
          import json, pathlib, os
          p = pathlib.Path("src/autoskillit/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["NEW_VERSION"]
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_int }}

      - name: Regenerate uv.lock (integration)
        run: uv lock

      - name: Commit and push integration version bump
        run: |
          set -euo pipefail
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump integration version to ${{ steps.version.outputs.new_int }}"
            git push origin integration
          fi
