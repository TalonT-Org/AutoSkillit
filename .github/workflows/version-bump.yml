name: Auto Patch Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump-and-sync:
    permissions:
      contents: write
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'integration'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          uv-version: "0.9.21"

      - name: Compute new patch version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          python3 - <<'EOF'
          import pathlib, os
          p = pathlib.Path("pyproject.toml")
          old_ver = f'version = "{os.environ["OLD_VERSION"]}"'
          new_ver = f'version = "{os.environ["NEW_VERSION"]}"'
          p.write_text(p.read_text().replace(old_ver, new_ver, 1))
          EOF
        env:
          OLD_VERSION: ${{ steps.version.outputs.old }}
          NEW_VERSION: ${{ steps.version.outputs.new }}

      - name: Update plugin.json
        run: |
          python3 - <<'EOF'
          import json, pathlib, os
          p = pathlib.Path("src/autoskillit/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["NEW_VERSION"]
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}

      - name: Regenerate uv.lock
        run: uv lock

      - name: Commit and push version bump to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
            git push origin main
          fi

      - name: Allow force-push on integration branch
        id: allow-force-push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BRANCH="integration"
          # If integration branch is unprotected, force-push is already permitted
          if ! PROTECTION=$(gh api "repos/$REPO/branches/$BRANCH/protection" 2>/dev/null); then
            echo "Branch '$BRANCH' has no protection — force-push permitted by default"
            exit 0
          fi
          # Rebuild protection payload with allow_force_pushes: true
          PAYLOAD=$(echo "$PROTECTION" | jq '{
            required_status_checks: (if .required_status_checks then {
              strict: .required_status_checks.strict,
              contexts: (.required_status_checks.contexts // [])
            } else null end),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (if .required_pull_request_reviews then {
              dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
              require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
              required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0)
            } else null end),
            restrictions: (if .restrictions then {
              users: [.restrictions.users[].login],
              teams: [.restrictions.teams[].slug],
              apps: [.restrictions.apps[].slug]
            } else null end),
            allow_force_pushes: true,
            allow_deletions: (.allow_deletions.enabled // false)
          }')
          echo "$PAYLOAD" | gh api "repos/$REPO/branches/$BRANCH/protection" \
            --method PUT --input -
          echo "INTEGRATION_PROTECTION_UPDATED=true" >> "$GITHUB_ENV"
          # Save restore payload (allow_force_pushes: false) as step output
          RESTORE_PAYLOAD=$(echo "$PROTECTION" | jq -c '{
            required_status_checks: (if .required_status_checks then {
              strict: .required_status_checks.strict,
              contexts: (.required_status_checks.contexts // [])
            } else null end),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (if .required_pull_request_reviews then {
              dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
              require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
              required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0)
            } else null end),
            restrictions: (if .restrictions then {
              users: [.restrictions.users[].login],
              teams: [.restrictions.teams[].slug],
              apps: [.restrictions.apps[].slug]
            } else null end),
            allow_force_pushes: false,
            allow_deletions: (.allow_deletions.enabled // false)
          }')
          echo "restore_payload=$RESTORE_PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "Configured integration branch to allow force-push"

      - name: Force-push integration to match main
        run: |
          set -euo pipefail
          git fetch origin main
          git push --force origin origin/main:refs/heads/integration

      - name: Checkout integration branch
        run: |
          set -euo pipefail
          git fetch origin integration
          git checkout -B integration origin/integration

      - name: Compute integration patch version
        id: integration_version
        run: |
          set -euo pipefail
          CURRENT=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml (integration)
        run: |
          python3 - <<'EOF'
          import pathlib, os, sys
          p = pathlib.Path("pyproject.toml")
          old_ver = f'version = "{os.environ["OLD_VERSION"]}"'
          new_ver = f'version = "{os.environ["NEW_VERSION"]}"'
          old_content = p.read_text()
          new_content = old_content.replace(old_ver, new_ver, 1)
          if new_content == old_content:
              print(f"ERROR: version pattern {old_ver!r} not found in pyproject.toml", file=sys.stderr)
              sys.exit(1)
          p.write_text(new_content)
          EOF
        env:
          OLD_VERSION: ${{ steps.integration_version.outputs.old }}
          NEW_VERSION: ${{ steps.integration_version.outputs.new }}

      - name: Update plugin.json (integration)
        run: |
          python3 - <<'EOF'
          import json, pathlib, os
          p = pathlib.Path("src/autoskillit/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["NEW_VERSION"]
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF
        env:
          NEW_VERSION: ${{ steps.integration_version.outputs.new }}

      - name: Regenerate uv.lock (integration)
        run: uv lock

      - name: Commit and push integration version bump
        run: |
          set -euo pipefail
          git add pyproject.toml src/autoskillit/.claude-plugin/plugin.json uv.lock
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: bump integration version to ${{ steps.integration_version.outputs.new }}"
            git push origin integration
          fi

      - name: Restore integration branch protection
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          if [[ "${INTEGRATION_PROTECTION_UPDATED:-}" != "true" ]]; then
            exit 0
          fi
          REPO="${{ github.repository }}"
          echo '${{ steps.allow-force-push.outputs.restore_payload }}' | \
            gh api "repos/$REPO/branches/integration/protection" \
              --method PUT --input -
          echo "Restored integration branch protection"
