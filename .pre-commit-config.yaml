repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy src/ --ignore-missing-imports
        language: system
        pass_filenames: false

      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false

      - id: no-generated-configs
        name: Block generated config files from being committed
        entry: "Machine-generated file — must not be committed. Run 'autoskillit install' to regenerate."
        language: fail
        files: '(src/autoskillit/hooks/hooks\.json|\.claude/settings\.json)'

      - id: doc-counts
        name: doc count accuracy
        entry: python scripts/check_doc_counts.py
        language: system
        files: ^(docs/|README\.md|src/autoskillit/skills/|src/autoskillit/recipes/|src/autoskillit/core/types\.py)
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
