version: '3'

vars:
  PYTEST_TMPDIR: '{{if eq OS "linux"}}/dev/shm/pytest-tmp{{else}}/tmp/pytest-tmp{{end}}'
  PYTEST_CACHEDIR: '{{if eq OS "linux"}}/dev/shm/pytest-cache{{else}}/tmp/pytest-cache{{end}}'

tasks:
  _tmpdir-setup:
    internal: true
    desc: Ensure test temp directories exist (platform-aware)
    cmds:
      - mkdir -p {{.PYTEST_TMPDIR}} {{.PYTEST_CACHEDIR}}

  test-all:
    desc: Run all tests with parallel workers
    deps: [_tmpdir-setup]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      OMP_NUM_THREADS: "1"
      TMPDIR: "{{.PYTEST_TMPDIR}}"
    cmds:
      - |
        mkdir -p temp
        TEST_OUTPUT="temp/test-$(date +%Y-%m-%d_%H%M%S).txt"
        echo "Running all tests with -n 4"
        echo "Output: $TEST_OUTPUT"
        if [[ -d ".venv" ]]; then
          .venv/bin/python -m pytest tests/ -q --tb=short -n 4 -m "not smoke" --disable-warnings -o "addopts=" --basetemp={{.PYTEST_TMPDIR}} -o "cache_dir={{.PYTEST_CACHEDIR}}" 2>&1 | tee "$TEST_OUTPUT"
        else
          pytest tests/ -q --tb=short -n 4 -m "not smoke" --disable-warnings -o "addopts=" --basetemp={{.PYTEST_TMPDIR}} -o "cache_dir={{.PYTEST_CACHEDIR}}" 2>&1 | tee "$TEST_OUTPUT"
        fi
        echo ""
        echo "Test output saved to: $TEST_OUTPUT"

  test-check:
    desc: Run all tests and return unambiguous PASS/FAIL (for automation)
    deps: [_tmpdir-setup]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      OMP_NUM_THREADS: "1"
      TMPDIR: "{{.PYTEST_TMPDIR}}"
    cmds:
      - |
        mkdir -p temp
        TEST_OUTPUT="temp/test-$(date +%Y-%m-%d_%H%M%S).txt"

        if [[ -d ".venv" ]]; then
          PYTEST_CMD=".venv/bin/python -m pytest"
        else
          PYTEST_CMD="pytest"
        fi

        set +e
        $PYTEST_CMD tests/ -q --tb=short -n 4 -m "not smoke" --disable-warnings -o "addopts=" --basetemp={{.PYTEST_TMPDIR}} -o "cache_dir={{.PYTEST_CACHEDIR}}" 2>&1 | tee "$TEST_OUTPUT"
        PYTEST_EXIT=${PIPESTATUS[0]}
        set -e

        echo ""
        echo "Test output saved to: $TEST_OUTPUT"

        if [ "$PYTEST_EXIT" -ne 0 ]; then
          echo ""
          echo "TEST_RESULT=FAIL"
          echo "PYTEST_EXIT_CODE=$PYTEST_EXIT"
          exit 1
        else
          echo ""
          echo "TEST_RESULT=PASS"
          exit 0
        fi

  test-smoke:
    desc: Run smoke tests (requires ANTHROPIC_API_KEY)
    deps: [_tmpdir-setup]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      OMP_NUM_THREADS: "1"
      SMOKE_TEST: "1"
      TMPDIR: "{{.PYTEST_TMPDIR}}"
    cmds:
      - |
        mkdir -p temp
        TEST_OUTPUT="temp/smoke-$(date +%Y-%m-%d_%H%M%S).txt"
        echo "Running smoke tests"
        echo "Output: $TEST_OUTPUT"
        if [[ -d ".venv" ]]; then
          .venv/bin/python -m pytest tests/test_smoke_pipeline.py -m smoke -v --tb=short -o "addopts=" --basetemp={{.PYTEST_TMPDIR}} -o "cache_dir={{.PYTEST_CACHEDIR}}" 2>&1 | tee "$TEST_OUTPUT"
        else
          pytest tests/test_smoke_pipeline.py -m smoke -v --tb=short -o "addopts=" --basetemp={{.PYTEST_TMPDIR}} -o "cache_dir={{.PYTEST_CACHEDIR}}" 2>&1 | tee "$TEST_OUTPUT"
        fi
        echo ""
        echo "Smoke test output saved to: $TEST_OUTPUT"

  install-worktree:
    desc: Set up development environment (isolated venv in worktrees, direct install in main)
    cmds:
      - |
        # Detect if we're in a git worktree (worktrees have .git as a file, not a directory)
        if [[ -f ".git" ]]; then
          echo "Worktree detected — creating isolated venv"
          uv venv .venv
          uv pip install -e '.[dev]' --python .venv/bin/python
        elif [[ -d ".venv" ]]; then
          echo "Main directory — installing into existing venv"
          uv pip install -e '.[dev]' --python .venv/bin/python
        else
          echo "Main directory — creating venv and installing"
          uv venv .venv
          uv pip install -e '.[dev]' --python .venv/bin/python
        fi
        echo "Done: $(python --version 2>/dev/null || .venv/bin/python --version)"
