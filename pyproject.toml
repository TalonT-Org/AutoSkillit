[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "automation-mcp"
version = "0.1.0"
description = "MCP server for orchestrating automated bug-fix loops with Claude Code"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=3.0.0rc2",
    "psutil>=7.2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.9.0",
]

[project.scripts]
automation-mcp = "automation_mcp.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/automation_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
