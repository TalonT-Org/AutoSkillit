# Default configuration for autoskillit.
# Resolution order (low → high priority):
#   1. This file (package defaults, always loaded)
#   2. ~/.autoskillit/config.yaml (user-level)
#   3. .autoskillit/config.yaml (project-level)
#   4. .autoskillit/.secrets.yaml (secrets, never commit)
#   5. AUTOSKILLIT_SECTION__KEY=value environment variables

test_check:
  command:
    - task
    - test-check
  timeout: 600

classify_fix:
  path_prefixes: []

reset_workspace:
  command: null
  preserve_dirs: []

implement_gate:
  marker: "Dry-walkthrough verified = TRUE"
  skill_names:
    - "/autoskillit:implement-worktree"
    - "/autoskillit:implement-worktree-no-merge"

safety:
  reset_guard_marker: ".autoskillit-workspace"
  require_dry_walkthrough: true
  test_gate_on_merge: true

read_db:
  timeout: 30
  max_rows: 10000

run_skill:
  timeout: 7200
  stale_threshold: 1200
  completion_marker: "%%ORDER_UP%%"
  completion_drain_timeout: 5.0
  exit_after_stop_delay_ms: 120000

model:
  default: sonnet
  override: null

worktree_setup:
  command: null

migration:
  suppressed: []

token_usage:
  verbosity: "summary"

quota_guard:
  enabled: true
  threshold: 90.0
  buffer_seconds: 60
  cache_max_age: 300
  credentials_path: "~/.claude/.credentials.json"
  cache_path: "~/.claude/autoskillit_quota_cache.json"

github:
  token: null
  default_repo: null
  in_progress_label: "in-progress"

report_bug:
  timeout: 600
  model: null
  report_dir: null          # null = {cwd}/.autoskillit/temp/bug-reports/
  github_filing: true
  github_labels:
    - "autoreported"
    - "bug"

logging:
  level: "INFO"
  json_output: null

linux_tracing:
  enabled: true
  proc_interval: 5.0
  log_dir: ""  # empty = platform default (~/.local/share/autoskillit/logs on Linux)
  tmpfs_path: "/dev/shm"  # RAM-backed tmpfs for crash-resilient streaming

mcp_response:
  alert_threshold_tokens: 2000

branching:
  default_base_branch: integration
