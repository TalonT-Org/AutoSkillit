from_version: "0.1.0"
to_version: "0.2.0"
description: "resolve-failures steps now require model: sonnet for reliable operation"
changes:
  - id: resolve-failures-model
    description: "Steps invoking resolve-failures should set model: sonnet"
    instruction: |
      Find any step whose tool is run_skill or run_skill_retry and whose
      skill_command (in the with: block) contains "resolve-failures".
      Add `model: sonnet` as a sibling field to `tool:` on that step.
      If the step already has a model: field, leave it unchanged.
    detect:
      tool: "run_skill"
      skill_pattern: "resolve-failures"
      missing_field: "model"
    example_before: |
      fix:
        tool: run_skill
        with:
          skill_command: "/autoskillit:resolve-failures ..."
          cwd: "${{ context.worktree_path }}"
        on_success: done
        on_failure: escalate
    example_after: |
      fix:
        tool: run_skill
        model: sonnet
        with:
          skill_command: "/autoskillit:resolve-failures ..."
          cwd: "${{ context.worktree_path }}"
        on_success: done
        on_failure: escalate

  - id: rename-tool-list-skill-scripts
    description: "list_skill_scripts renamed to list_recipes"
    instruction: |
      Find every step where `tool: list_skill_scripts` and rename the tool value
      to `list_recipes`. Leave all other step fields unchanged.
    detect:
      tool: "list_skill_scripts"
      rename_to: "list_recipes"
    example_before: |
      my_step:
        tool: list_skill_scripts
        on_success: done
    example_after: |
      my_step:
        tool: list_recipes
        on_success: done

  - id: rename-tool-load-skill-script
    description: "load_skill_script renamed to load_recipe"
    instruction: |
      Find every step where `tool: load_skill_script` and rename to `load_recipe`.
    detect:
      tool: "load_skill_script"
      rename_to: "load_recipe"
    example_before: |
      my_step:
        tool: load_skill_script
    example_after: |
      my_step:
        tool: load_recipe

  - id: rename-tool-validate-script
    description: "validate_script renamed to validate_recipe"
    instruction: |
      Find every step where `tool: validate_script` and rename to `validate_recipe`.
    detect:
      tool: "validate_script"
      rename_to: "validate_recipe"
    example_before: |
      my_step:
        tool: validate_script
    example_after: |
      my_step:
        tool: validate_recipe

  - id: rename-tool-autoskillit-status
    description: "autoskillit_status renamed to kitchen_status"
    instruction: |
      Find every step where `tool: autoskillit_status` and rename to `kitchen_status`.
    detect:
      tool: "autoskillit_status"
      rename_to: "kitchen_status"
    example_before: |
      my_step:
        tool: autoskillit_status
    example_after: |
      my_step:
        tool: kitchen_status
