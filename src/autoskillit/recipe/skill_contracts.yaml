version: 0.1.0
skills:
  troubleshoot-experiment:
    inputs:
    - name: worktree_path
      type: string
      required: true
    - name: step_name
      type: string
      required: true
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "is_fixable\\s*=\\s*(true|false)"
    pattern_examples:
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = stale_timeout\nis_fixable = true\n%%ORDER_UP%%"
    write_behavior: always
  diagnose-ci:
    inputs:
    - name: branch
      type: string
      required: true
    - name: run_id
      type: string
      required: false
    - name: ci_failed_jobs
      type: string
      required: false
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "diagnosis_path\\s*=\\s*/.+"
    pattern_examples:
    - "diagnosis_path = /tmp/diagnosis.md\n%%ORDER_UP%%"
    write_behavior: always
  resolve-design-review:
    inputs:
    - name: evaluation_dashboard
      type: file_path
      required: true
    - name: experiment_plan
      type: file_path
      required: true
    outputs:
    - name: resolution
      type: string
      allowed_values: [revised, failed]
    - name: revision_guidance
      type: file_path
    expected_output_patterns:
    - "resolution\\s*=\\s*(revised|failed)"
    - "resolution\\s*=\\s*revised[\\s\\S]*?revision_guidance\\s*=\\s*/.+"
    pattern_examples:
    - "resolution = revised\nrevision_guidance = /tmp/guidance.md\n%%ORDER_UP%%"
    - "resolution = failed\n%%ORDER_UP%%"
    write_behavior: always
  resolve-failures:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs: []
    write_behavior: conditional
    write_expected_when:
    - "fixes_applied\\s*=\\s*[1-9][0-9]*"
  resolve-merge-conflicts:
    inputs:
    - name: worktree_path
