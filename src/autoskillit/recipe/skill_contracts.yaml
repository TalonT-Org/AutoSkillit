version: 0.1.0
skills:
  diagnose-ci:
    inputs:
    - name: branch
      type: string
      required: true
    - name: run_id
      type: string
      required: false
    - name: ci_failed_jobs
      type: string
      required: false
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "diagnosis_path\\s*=\\s*/.+"
    pattern_examples:
    - "diagnosis_path = /tmp/diagnosis.md\n%%ORDER_UP%%"
    write_behavior: always
  resolve-failures:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs: []
    write_behavior: always
  resolve-merge-conflicts:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    - name: conflict_report_path
      type: file_path
    - name: escalation_required
      type: string
    - name: escalation_reason
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
    pattern_examples:
    - "worktree_path = /tmp/worktrees/impl-foo-20260316\n%%ORDER_UP%%"
    write_behavior: conditional
    write_expected_when:
    - "conflict_report_path\\s*=\\s*/.+"
  resolve-review:
    inputs:
    - name: feature_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    outputs: []
    write_behavior: always
  dry-walkthrough:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    outputs: []
    write_behavior: always
  implement-worktree:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
