version: 0.1.0
skills:
  diagnose-ci:
    inputs:
    - name: branch
      type: string
      required: true
    - name: run_id
      type: string
      required: false
    - name: ci_failed_jobs
      type: string
      required: false
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "diagnosis_path\\s*=\\s*/.+"
  resolve-failures:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs: []
  resolve-merge-conflicts:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    - name: escalation_required
      type: string
    - name: escalation_reason
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
  resolve-review:
    inputs:
    - name: feature_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    outputs: []
  dry-walkthrough:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    outputs: []
  implement-worktree:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
  implement-worktree-no-merge:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
  investigate:
    inputs:
    - name: topic
      type: string
      required: true
    outputs:
    - name: investigation_path
      type: file_path
    expected_output_patterns:
    - "investigation_path\\s*=\\s*/.+"
  make-groups:
    inputs:
    - name: source_doc
      type: file_path
      required: true
    outputs:
    - name: groups_path
      type: file_path
    - name: manifest_path
      type: file_path
    - name: group_files
      type: file_path_list
    expected_output_patterns:
    - "groups_path\\s*=\\s*/.+"
  make-plan:
    inputs:
    - name: task
      type: string
      required: true
    outputs:
    - name: plan_path
      type: file_path
    - name: plan_parts
      type: file_path_list
    expected_output_patterns:
    - "plan_path\\s*=\\s*/.+"
  write-recipe:
    inputs: []
    outputs:
    - name: recipe_path
      type: file_path
    expected_output_patterns:
    - "recipe_path\\s*=\\s*/.+"
  mermaid:
    inputs: []
    outputs: []
  pipeline-summary:
    inputs:
    - name: bug_report_path
      type: file_path
      required: true
    - name: feature_branch
      type: string
      required: true
    - name: target_branch
      type: string
      required: true
    - name: workspace
      type: directory_path
      required: true
    outputs:
    - name: summary_path
      type: file_path
    expected_output_patterns:
    - "summary_path\\s*=\\s*.+"
  rectify:
    inputs:
    - name: investigation_path
      type: file_path
      required: true
    outputs:
    - name: plan_path
      type: file_path
    - name: plan_parts
      type: file_path_list
    expected_output_patterns:
    - "plan_path\\s*=\\s*/.+"
  retry-worktree:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    - name: worktree_path
      type: directory_path
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
  review-approach:
    inputs:
    - name: plan_path
      type: file_path
      required: false
    outputs:
    - name: review_path
      type: file_path
    expected_output_patterns:
    - "review_path\\s*=\\s*/.+"
  setup-project:
    inputs:
    - name: project_dir
      type: directory_path
      required: true
    outputs:
    - name: analysis_path
      type: file_path
    - name: config_path
      type: file_path
    expected_output_patterns:
    - "analysis_path\\s*=\\s*/.+"
  audit-friction:
    inputs: []
    outputs: []
  audit-impl:
    inputs:
    - name: plan_path
      type: file_path
      required: true
    - name: branch_name
      type: string
      required: false
    - name: base_branch
      type: string
      required: false
    outputs:
    - name: verdict
      type: string
    - name: remediation_path
      type: file_path
    expected_output_patterns:
    - "verdict\\s*=\\s*(GO|NO_GO)"
  migrate-recipes:
    inputs: []
    outputs: []
  analyze-prs:
    inputs:
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: pr_order_file
      type: file_path
    - name: analysis_file
      type: file_path
    - name: integration_branch
      type: string
    - name: pr_count
      type: string
    - name: simple_count
      type: string
    - name: needs_check_count
      type: string
    - name: queue_mode
      type: string
    expected_output_patterns:
    - "pr_order_file\\s*=\\s*.+"
  merge-pr:
    inputs:
    - name: pr_number
      type: string
      required: true
    - name: complexity
      type: string
      required: true
    outputs:
    - name: merged
      type: string
    - name: needs_plan
      type: string
    - name: escalation_required
      type: string
    - name: escalation_reason
      type: string
    - name: pr_number
      type: string
    - name: pr_branch
      type: string
    - name: pr_title
      type: string
    - name: conflict_report_path
      type: file_path
    expected_output_patterns:
    - "merged\\s*=\\s*(true|false)"

  open-pr:
    inputs:
    - name: plan_paths
      type: string
      required: true
    - name: feature_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    - name: token_summary_path
      type: file_path
      required: false
    - name: closing_issue
      type: string
      required: false
    outputs: []
    expected_output_patterns:
    - "https://github\\.com/.*/pull/\\d+"

  create-review-pr:
    inputs:
    - name: integration_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    - name: pr_order_file
      type: file_path
      required: true
    - name: audit_verdict
      type: string
      required: false
    outputs:
    - name: pr_url
      type: string
    expected_output_patterns:
    - "https://github\\.com/.*/pull/\\d+"

  triage-issues:
    inputs: []
    outputs:
    - name: triage_report
      type: file_path
    - name: triage_manifest
      type: file_path
    - name: total_issues
      type: string
    - name: batch_count
      type: string
    - name: recipe_distribution
      type: string
    expected_output_patterns:
    - "triage_report\\s*=\\s*.+"

  review-pr:
    inputs:
    - name: feature_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: verdict
      type: string
      allowed_values:
        - approved
        - changes_requested
        - needs_human
    expected_output_patterns:
    - "verdict\\s*=\\s*(approved|changes_requested|needs_human)"

  arch-lens-c4-container:
    inputs:
    - name: project_context
      type: string
      required: false
    outputs:
    - name: diagram_path
      type: file_path
    expected_output_patterns:
    - "diagram_path\\s*=\\s*/.+"

  arch-lens-concurrency:
