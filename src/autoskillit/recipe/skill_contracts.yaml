version: 0.1.0
skills:
  troubleshoot-experiment:
    inputs:
    - name: worktree_path
      type: string
      required: true
    - name: step_name
      type: string
      required: true
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "is_fixable\\s*=\\s*(true|false)"
    pattern_examples:
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = stale_timeout\nis_fixable = true\n%%ORDER_UP%%"
    write_behavior: always
  diagnose-ci:
    inputs:
    - name: branch
      type: string
      required: true
    - name: run_id
      type: string
      required: false
    - name: ci_failed_jobs
      type: string
      required: false
    outputs:
    - name: diagnosis_path
      type: file_path
    - name: failure_type
      type: string
      allowed_values: [test, lint, build, type_check, env, unknown]
    - name: failure_subtype
      type: string
      allowed_values: [flaky, timing_race, deterministic, fixture, import, env, unknown]
    - name: is_fixable
      type: string
    expected_output_patterns:
    - "diagnosis_path\\s*=\\s*(?:/.+)?"
    - "failure_subtype\\s*=\\s*(flaky|timing_race|deterministic|fixture|import|env|unknown)"
    pattern_examples:
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = test\nfailure_subtype = deterministic\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = test\nfailure_subtype = flaky\nis_fixable = false\n%%ORDER_UP%%"
    - "diagnosis_path = \nfailure_type = test\nfailure_subtype = unknown\nis_fixable = false\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = test\nfailure_subtype = timing_race\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = test\nfailure_subtype = fixture\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = test\nfailure_subtype = import\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = lint\nfailure_subtype = unknown\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = build\nfailure_subtype = unknown\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = type_check\nfailure_subtype = unknown\nis_fixable = true\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = env\nfailure_subtype = env\nis_fixable = false\n%%ORDER_UP%%"
    - "diagnosis_path = /tmp/diagnosis.md\nfailure_type = unknown\nfailure_subtype = unknown\nis_fixable = false\n%%ORDER_UP%%"
    write_behavior: always
  resolve-design-review:
    inputs:
    - name: evaluation_dashboard
      type: file_path
      required: true
    - name: experiment_plan
      type: file_path
      required: true
    outputs:
    - name: resolution
      type: string
      allowed_values: [revised, failed]
    - name: revision_guidance
      type: file_path
    expected_output_patterns:
    - "resolution\\s*=\\s*(revised|failed)"
    - "(?:revision_guidance\\s*=\\s*/.+|resolution\\s*=\\s*failed)"
    pattern_examples:
    - "resolution = revised\nrevision_guidance = /tmp/guidance.md\n%%ORDER_UP%%"
    - "resolution = failed\n%%ORDER_UP%%"
    write_behavior: always
  resolve-failures:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    - name: diagnosis_path
      type: file_path
      required: false
    outputs:
    - name: verdict
      type: string
      allowed_values:
        - real_fix
        - already_green
        - flake_suspected
        - ci_only_failure
    - name: fixes_applied
      type: integer
    write_behavior: conditional
    write_expected_when:
    - "verdict\\s*=\\s*real_fix"
  resolve-merge-conflicts:
    inputs:
    - name: worktree_path
      type: directory_path
      required: true
    - name: plan_path
      type: file_path
      required: true
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: worktree_path
      type: directory_path
    - name: branch_name
      type: string
    - name: conflict_report_path
      type: file_path
    - name: escalation_required
      type: string
    - name: escalation_reason
      type: string
    expected_output_patterns:
    - "worktree_path\\s*=\\s*/.+"
    pattern_examples:
    - "worktree_path = /tmp/worktrees/impl-foo-20260316\n%%ORDER_UP%%"
    write_behavior: conditional
    write_expected_when:
    - "conflict_report_path\\s*=\\s*/.+"
  resolve-review:
    inputs:
    - name: feature_branch
      type: string
      required: true
    - name: base_branch
      type: string
      required: true
    outputs:
    - name: verdict
