name: audit-and-fix
description: Audit codebase, investigate findings, plan fixes, implement in a feature branch, and open a PR.
autoskillit_version: "0.3.0"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All code changes and investigation happen through
    headless sessions via run_skill/run_skill_retry."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    resolve-failures) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."
  - "SEQUENTIAL EXECUTION: complete full cycle per part before advancing.
    For each plan_part, run the full cycle (implement → test → merge) before
    starting the next part. Do NOT batch-implement all parts upfront."
  - "By default (open_pr=true), a feature branch named from inputs.run_name is created.
    All worktree merges target the feature branch (context.merge_target), not base_branch
    directly. The push step publishes the feature branch, then open_pr_step opens a PR to
    base_branch. When open_pr=false, merges target base_branch directly and open_pr_step
    is skipped."
  - "SOURCE ISOLATION: After clone_repo returns, the source_dir is strictly
    off-limits. Never run any command in source_dir — no git checkout, git
    fetch, git reset, git pull, run_cmd, run_skill, or any other operation.
    All work — skill invocations, git operations, file reads — happens
    exclusively in the clone (work_dir). source_dir is used ONLY to read
    the remote URL inside push_to_remote."

ingredients:
  source_dir:
    description: >
      Path to the source repository to clone and work in.
      Leave empty to auto-detect from git rev-parse --show-toplevel.
    required: false
    default: ""
  run_name:
    description: Name prefix for this pipeline run (used in clone directory name and feature branch name)
    default: "audit-fix"
  base_branch:
    description: Branch to branch off of and PR target
    default: main
  audit_type:
    description: Type of audit to run (arch, tests, cohesion, defense-standards)
    default: arch
  open_pr:
    description: Create a feature branch (named from run_name) and open a GitHub PR to merge it into base_branch. The standard workflow — all worktree merges target the feature branch, then a PR is opened to base_branch. Set to false to merge directly into base_branch without a PR. (true/false)
    default: "true"

steps:
  clone:
    tool: clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
      branch: "${{ inputs.base_branch }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      remote_url: "${{ result.remote_url }}"
    on_success: set_merge_target
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir context used by all subsequent steps as cwd.
      On failure, escalate_stop is reached immediately (no clone to remove).

  set_merge_target:
    tool: run_cmd
    with:
      cmd: "printf '%s' '${{ inputs.base_branch }}'"
      cwd: "${{ context.work_dir }}"
    capture:
      merge_target: "${{ result.stdout }}"
    on_success: create_branch
    on_failure: escalate_stop
    note: >
      Unconditionally sets merge_target to inputs.base_branch as a fallback.
      In the standard flow (open_pr=true), the subsequent create_branch step
      overrides merge_target with the feature branch name. When open_pr=false,
      create_branch is skipped and this fallback stands.

  create_branch:
    tool: run_cmd
    with:
      cmd: "git checkout -b ${{ inputs.run_name }} && echo ${{ inputs.run_name }}"
      cwd: "${{ context.work_dir }}"
    capture:
      merge_target: "${{ result.stdout }}"
    on_success: push_merge_target
    on_failure: cleanup_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs by default (open_pr=true). Skipped when open_pr=false.
      Creates the feature branch (git checkout -b {run_name}) and captures the branch name
      as context.merge_target, overriding the fallback set by set_merge_target.
      All subsequent merge/push steps target this feature branch.

  push_merge_target:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: audit
    on_failure: cleanup_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs by default (open_pr=true). Skipped when open_pr=false.
      Publishes the feature branch to origin before any merge_worktree call.
      merge_worktree requires refs/remotes/origin/{branch} to exist after fetch.
      Without this step, merge_worktree fails with WORKTREE_INTACT_BASE_NOT_PUBLISHED.
      Uses the pre-resolved remote_url from the clone step to preserve clone isolation.

  audit:
    tool: run_skill
    with:
      skill_command: "/audit-${{ inputs.audit_type }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit"
    on_success: investigate
    on_failure: cleanup_failure

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the audit findings"
      cwd: "${{ context.work_dir }}"
      step_name: "investigate"
    on_success: plan
    on_failure: cleanup_failure

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify the investigation"
      cwd: "${{ context.work_dir }}"
      step_name: "plan"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: implement
    on_failure: cleanup_failure
    note: "Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically into plan_parts[]."

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    retry:
      max_attempts: 0
      on: needs_retry
      on_exhausted: retry_worktree
    on_success: test
    on_failure: cleanup_failure

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure
    on_success: test
    on_failure: cleanup_failure

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge
    on_failure: fix

  fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-failures ${{ context.worktree_path }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "fix"
    on_success: test
    on_failure: cleanup_failure
    on_retry: test

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ context.merge_target }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_success: push
    on_failure: cleanup_failure

  push:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: open_pr_step
    on_failure: cleanup_failure
    note: >
      Pushes merge_target branch from the clone to the upstream remote.
      By default (open_pr=true), this pushes the feature branch; when open_pr=false, pushes base_branch.
      Uses the pre-resolved remote_url captured at clone time, preserving clone isolation.
      On success, routes to open_pr_step (which opens the PR by default; skipped when open_pr=false).

  open_pr_step:
    tool: run_skill
    with:
      skill_command: "/autoskillit:open-pr ${{ context.plan_path }} ${{ inputs.run_name }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "open_pr"
    on_success: cleanup_success
    on_failure: cleanup_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs by default (open_pr=true). Skipped when open_pr=false.
      The feature branch is already published by the push step that precedes this step.
      Invokes the open-pr skill which selects arch-lens diagrams, composes a PR body,
      and runs gh pr create. The skill gracefully degrades if gh is unavailable.
      TOKEN SUMMARY: Before invoking this step, the orchestrator MUST:
      1. Call get_token_summary(clear=false) to retrieve accumulated token usage.
      2. Format the JSON result as a markdown table with columns: Step, input, output,
         cache_create, cache_read. Include a bold Total row.
      3. Write the formatted table to temp/open-pr/token_summary.md via run_cmd.
      4. Append the file path as a 4th positional argument to the skill_command.

  cleanup_success:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: done
    on_failure: done
    note: >
      Clone preservation step — keep=true means the clone is never
      auto-removed. Remove manually when done: rm -rf {clone_path}.
      Routes to done regardless — this step is intentionally a no-op.

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Clone preservation step — keep=true means the clone is never
      auto-removed on failure. Remove manually: rm -rf {clone_path}.
      Always routes to escalate_stop.

  done:
    action: stop
    message: "Audit findings addressed. Changes merged via PR."

  escalate_stop:
    action: stop
    message: "Human intervention needed."
