name: audit-and-fix
description: Audit codebase, investigate findings, plan fixes, and implement.
autoskillit_version: "0.2.0"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All code changes and investigation happen through
    headless sessions via run_skill/run_skill_retry."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    assess-and-merge) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."

ingredients:
  source_dir:
    description: >
      Path to the source repository to clone and work in.
      Leave empty to auto-detect from git rev-parse --show-toplevel.
    required: false
    default: ""
  run_name:
    description: Name prefix for this pipeline run (used in clone directory name)
    default: "audit-fix"
  keep_clone_on_failure:
    description: Keep the clone directory when the pipeline fails (true/false)
    default: "false"
  base_branch:
    description: Branch to merge fixes into
    default: main
  audit_type:
    description: Type of audit to run (arch, tests, cohesion, defense-standards)
    default: arch

steps:
  clone:
    python: autoskillit.workspace.clone.clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      source_dir: "${{ result.source_dir }}"
    on_success: audit
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir context used by all subsequent steps as cwd.
      On failure, escalate_stop is reached immediately (no clone to remove).

  audit:
    tool: run_skill
    with:
      skill_command: "/audit-${{ inputs.audit_type }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit"
    on_success: investigate
    on_failure: cleanup_failure

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the audit findings"
      cwd: "${{ context.work_dir }}"
      step_name: "investigate"
    on_success: plan
    on_failure: cleanup_failure

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify the investigation"
      cwd: "${{ context.work_dir }}"
      step_name: "plan"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: implement
    on_failure: cleanup_failure
    note: "Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically into plan_parts[]."

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    retry:
      max_attempts: 0
      on: needs_retry
      on_exhausted: retry_worktree
    on_success: test
    on_failure: cleanup_failure

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree the plan ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure
    on_success: test
    on_failure: cleanup_failure

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: push
    on_failure: cleanup_failure

  push:
    python: autoskillit.workspace.clone.push_clone_to_origin
    with:
      clone_path: "${{ context.work_dir }}"
      source_dir: "${{ context.source_dir }}"
      branch: "${{ inputs.base_branch }}"
    on_success: cleanup_success
    on_failure: cleanup_failure
    note: >
      Propagates the merged base_branch from the clone back to the source repository
      using pull inversion (git fetch from the source_dir side). This avoids Git's
      receive.denyCurrentBranch restriction on non-bare local repos.
      On failure, cleanup_failure still removes the clone.

  cleanup_success:
    python: autoskillit.workspace.clone.remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "false"
    on_success: done
    on_failure: done
    note: >
      Removes the clone directory after a successful pipeline run.
      Routes to done regardless of whether removal succeeds — a cleanup
      failure should not mask a successful pipeline.

  cleanup_failure:
    python: autoskillit.workspace.clone.remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "${{ inputs.keep_clone_on_failure }}"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Called on any pipeline failure where the clone was created.
      Respects keep_clone_on_failure ingredient for debugging.
      Always routes to escalate_stop.

  done:
    action: stop
    message: "Audit findings addressed. Changes ready for review."

  escalate_stop:
    action: stop
    message: "Human intervention needed."
