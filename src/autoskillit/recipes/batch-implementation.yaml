name: batch-implementation
description: >
  Implement multiple GitHub issues efficiently by sharing setup overhead (clone,
  base_sha, merge_target) across all issues. Per-issue: get_issue_title →
  claim_issue → compute_branch → create_branch → implement → push → open_pr_step →
  release_issue_success. Reduces redundant setup from O(n) to O(1).
  TODO #237: Full loop state accumulation pending write_telemetry_files tool landing.
summary: "clone > capture_base_sha > set_merge_target > [per issue: get_issue_title > claim_issue > compute_branch > create_branch > implement > push_merge_target > open_pr_step > release_issue_success] > delete_clone"
autoskillit_version: "0.3.0"

ingredients:
  issues_file:
    description: >
      Path to a JSON file containing an array of issue objects with keys:
      issue_url (string) and task (string description for make-plan).
      Example: [{"issue_url": "https://github.com/org/repo/issues/42", "task": "Fix bug X"}]
    required: true
  source_dir:
    description: >
      Path to the source repository to clone and work in.
      Leave empty to auto-detect from git rev-parse --show-toplevel.
    required: false
    default: ""
  run_name:
    description: >
      Name prefix for this pipeline run. Used as the first path component
      of feature branch names and in the clone directory name.
    default: "batch-impl"
  base_branch:
    description: Branch to merge into (defaults to main)
    default: main
  audit:
    description: Run /autoskillit:audit-impl after all issues are implemented (true/false)
    default: "false"
  current_issue_url:
    description: >
      Set per-iteration by the orchestrator from the issues_file manifest.
      The orchestrator overwrites this before each loop iteration.
      TODO #237: Replace with loop mechanism once write_telemetry_files lands.
    default: ""
  current_issue_task:
    description: >
      Set per-iteration by the orchestrator from the issues_file manifest.
      The orchestrator overwrites this before each loop iteration.
      TODO #237: Replace with loop mechanism once write_telemetry_files lands.
    default: ""

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill."
  - "Route to on_failure — never investigate or fix directly from the orchestrator."
  - "SHARED SETUP: clone, capture_base_sha, and set_merge_target run ONCE for all
    issues. Do NOT clone or capture SHA per-issue."
  - "ISSUE LOOP: After set_merge_target, iterate through each issue in issues_file
    sequentially. For each issue, run the full cycle (get_issue_title → claim_issue
    → compute_branch → create_branch → implement → push → open_pr_step →
    release_issue_success) before advancing to the next issue."
  - "TODO #237: Multi-issue branch/worktree state accumulation across loop
    iterations requires write_telemetry_files tool (not yet landed). This recipe
    delivers the shared-setup structure; the full loop accumulation logic will be
    added in a follow-up after #237 lands."
  - "SOURCE ISOLATION: After clone_repo returns, the source_dir is strictly
    off-limits. Never run any command in source_dir — no git checkout, git
    fetch, git reset, git pull, run_cmd, run_skill, or any other operation.
    All work — skill invocations, git operations, file reads — happens
    exclusively in the clone (work_dir). source_dir is used ONLY to read
    the remote URL inside push_to_remote."

steps:
  clone:
    tool: clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
      branch: "${{ inputs.base_branch }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      remote_url: "${{ result.remote_url }}"
    on_success: capture_base_sha
    on_failure: escalate_stop
    note: >
      Clones source_dir once for the entire batch. All issue iterations share this
      clone, saving the clone overhead that would occur in single-issue pipelines.
      On failure, escalate_stop is reached immediately (no clone to remove).

  capture_base_sha:
    tool: run_cmd
    with:
      cmd: "git -C ${{ context.work_dir }} rev-parse ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "capture_base_sha"
    on_success: set_merge_target
    on_failure: escalate_stop
    note: >
      Verifies base_branch exists in the clone. The SHA output is not captured
      in this skeleton — it will be captured and used by audit_impl once the
      full implement cycle is added after TODO #237 lands.

  set_merge_target:
    tool: run_cmd
    with:
      cmd: "printf '%s' '${{ inputs.base_branch }}'"
      cwd: "${{ context.work_dir }}"
      step_name: "set_merge_target"
    capture:
      merge_target: "${{ result.stdout }}"
    on_success: get_issue_title
    on_failure: escalate_stop
    note: >
      Sets merge_target fallback once. Per-issue create_branch steps will override
      merge_target with feature branch names for each issue in the loop.

  get_issue_title:
    tool: get_issue_title
    with:
      issue_url: "${{ inputs.current_issue_url }}"
    capture:
      issue_number: "${{ result.number }}"
      issue_slug: "${{ result.slug }}"
    on_success: claim_issue
    on_failure: cleanup_failure
    optional: true
    skip_when_false: "inputs.current_issue_url"
    note: >
      Fetches number and slug for the current issue in the loop.
      inputs.current_issue_url is set by the orchestrator from the issues_file
      manifest before routing here. On failure, route to cleanup_failure to
      abort the batch — a GitHub API failure here is not recoverable per-issue.

  claim_issue:
    tool: claim_issue
    optional: true
    skip_when_false: "inputs.current_issue_url"
    with:
      issue_url: "${{ inputs.current_issue_url }}"
    capture:
      claimed: "${{ result.claimed }}"
    on_result:
      - when: "${{ result.claimed }} == true"
        route: compute_branch
      - route: next_or_done_issue
    on_failure: release_issue_failure
    note: >
      Claims the issue to prevent parallel work. If already claimed, routes to
      next_or_done_issue via on_result. On failure, release the issue and proceed.

  compute_branch:
    tool: run_cmd
    with:
      cmd: >-
        SLUG="${{ context.issue_slug }}" &&
        RUN="${{ inputs.run_name }}" &&
        PREFIX="${SLUG:-$RUN}" &&
        ISSUE="${{ context.issue_number }}" &&
        if [ -n "$ISSUE" ]; then
          printf '%s' "${PREFIX}/${ISSUE}"
        else
          printf '%s' "${PREFIX}/$(date +%Y%m%d)"
        fi
      cwd: "${{ context.work_dir }}"
      step_name: "compute_branch"
    capture:
      proposed_branch: "${{ result.stdout | trim }}"
    on_success: create_branch
    on_failure: release_issue_failure
    note: >
      Computes the proposed branch name for this issue — no git operations.

  create_branch:
    tool: create_unique_branch
    with:
      base_branch_name: "${{ context.proposed_branch }}"
      cwd: "${{ context.work_dir }}"
    capture:
      merge_target: "${{ result.branch_name }}"
    on_success: push_merge_target
    on_failure: release_issue_failure
    note: >
      Atomic branch creation for this issue. Uses create_unique_branch MCP tool
      for collision-safe checkout without intermediate git fetch commands.

  push_merge_target:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: implement
    on_failure: release_issue_failure
    note: >
      Publishes the per-issue feature branch before implement. Required by
      merge_worktree which needs refs/remotes/origin/{branch} to exist.

  implement:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan ${{ inputs.current_issue_task }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
      issue_url: "${{ inputs.current_issue_url }}"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: open_pr_step
    on_failure: release_issue_failure
    note: >
      Runs make-plan for this issue's task. inputs.current_issue_task is the
      'task' field from the issues_file entry for the current issue.
      After make-plan completes, glob plan_dir for *_part_*.md or single plan
      file — plan_parts contains the full ordered list of part files.
      TODO #237: Full implement-worktree + test + merge cycle will be added
      after write_telemetry_files lands to support per-iteration state accumulation.
      This step currently produces the plan only.

  open_pr_step:
    tool: run_skill
    with:
      skill_command: "/autoskillit:open-pr ${{ context.plan_path }} ${{ inputs.run_name }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "open_pr"
      issue_number: "${{ context.issue_number }}"
    on_success: release_issue_success
    on_failure: release_issue_failure
    note: >
      Opens a PR for this issue's feature branch. Routes to release_issue_success
      on completion, then next_or_done_issue to process the next issue.

  release_issue_success:
    tool: release_issue
    optional: true
    skip_when_false: "inputs.current_issue_url"
    with:
      issue_url: "${{ inputs.current_issue_url }}"
    on_success: next_or_done_issue
    on_failure: next_or_done_issue

  release_issue_failure:
    tool: release_issue
    optional: true
    skip_when_false: "inputs.current_issue_url"
    with:
      issue_url: "${{ inputs.current_issue_url }}"
    on_success: next_or_done_issue
    on_failure: cleanup_failure

  next_or_done_issue:
    action: route
    on_result:
      - when: "${{ result.next }} == more_issues"
        route: get_issue_title
      - route: confirm_cleanup
    note: >
      Routing step — no tool call. The agent evaluates what comes next:
      1. If more issues remain in issues_file → advance context.current_issue_url
         and context.current_issue_task to the next entry, then route to get_issue_title.
      2. If all issues are processed → route to confirm_cleanup.

  confirm_cleanup:
    action: confirm
    message: >-
      Batch implementation pipeline complete! The clone at ${{ context.work_dir }} is preserved.
      Delete it now? Keeping it lets you resume any session from this pipeline run.
      Type yes to delete or no to keep.
    on_success: delete_clone
    on_failure: done

  delete_clone:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "false"
      step_name: delete_clone
    on_success: done
    on_failure: done

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Clone preservation on failure. keep=true means never auto-remove.
      Remove manually: rm -rf {clone_path}.

  done:
    action: stop
    message: "Batch implementation pipeline complete. All issues processed."

  escalate_stop:
    action: stop
    message: "Pipeline failed — human intervention needed. Check the clone for details."
