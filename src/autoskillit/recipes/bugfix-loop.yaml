name: bugfix-loop
description: End-to-end test with automatic bug fixing in isolated worktrees.
autoskillit_version: "0.3.0"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All code changes and investigation happen through
    headless sessions via run_skill."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    resolve-failures) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."
  - "SEQUENTIAL EXECUTION: complete full cycle per part before advancing.
    For each plan_part, run the full cycle (implement → test → merge) before
    starting the next part. Do NOT batch-implement all parts upfront."

ingredients:
  test_dir:
    description: Directory containing the project to test
    required: true
  base_branch:
    description: Branch to merge fixes into
    default: integration
  helper_dir:
    description: Directory for helper agent sessions
    required: true
  audit:
    description: Gate merge on audit-impl quality check (true/false)
    default: "true"

steps:
  reset:
    tool: reset_test_dir
    with:
      test_dir: ${{ inputs.test_dir }}
    on_success: test
    on_failure: escalate

  test:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: done
    on_failure: investigate

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the test failures"
      cwd: ${{ inputs.helper_dir }}
      step_name: "investigate"
    capture:
      investigation_path: "${{ result.investigation_path }}"
    on_success: plan
    on_failure: escalate

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify ${{ context.investigation_path }}"
      cwd: ${{ inputs.helper_dir }}
      step_name: "plan"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: implement
    on_failure: escalate
    note: >
      Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically into plan_parts[].
      REMEDIATION MODE: when routed from remediate, context.remediation_path is available
      — include it in the skill_command or as context for the rectify skill.

  implement:
    tool: run_skill
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.plan_path }}"
      cwd: ${{ inputs.helper_dir }}
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    retries: 0
    on_context_limit: retry_worktree
    on_success: verify
    on_failure: escalate

  retry_worktree:
    tool: run_skill
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    on_exhausted: escalate
    on_success: verify
    on_failure: escalate

  verify:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: audit_impl
    on_failure: assess

  assess:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-failures ${{ context.worktree_path }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "assess"
    on_success: verify
    on_failure: classify
    on_exhausted: classify

  classify:
    tool: classify_fix
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    on_result:
      - when: "${{ result.restart_scope }} == full_restart"
        route: investigate
      - when: "result.error"
        route: escalate
      - route: implement
    on_failure: escalate

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ context.branch_name }} ${{ inputs.base_branch }}"
      cwd: ${{ inputs.helper_dir }}
      step_name: "audit_impl"
    capture:
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      - when: "${{ result.verdict }} == GO"
        route: merge
      - when: "result.error"
        route: escalate
      - route: remediate
    on_failure: escalate
    optional: true
    skip_when_false: "inputs.audit"
    note: Only run if inputs.audit = true. If inputs.audit = false, skip directly to merge.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan

  merge:
    tool: merge_worktree
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_result:
      - when: "result.failed_step == 'dirty_tree'"
        route: assess
      - when: "result.failed_step == 'test_gate'"
        route: assess
      - when: "result.failed_step == 'post_rebase_test_gate'"
        route: assess
      - when: "result.failed_step == 'rebase'"
        route: assess
      - when: "result.error"
        route: escalate
      - route: done
    on_failure: escalate

  done:
    action: stop
    message: "All tests passing. Fix merged successfully."

  escalate:
    action: stop
    message: "Human intervention needed. Review the latest output for details."
