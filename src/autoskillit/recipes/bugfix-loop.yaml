name: bugfix-loop
description: End-to-end test with automatic bug fixing in isolated worktrees.
autoskillit_version: "0.2.0"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All code changes and investigation happen through
    headless sessions via run_skill/run_skill_retry."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    resolve-failures) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."

ingredients:
  test_dir:
    description: Directory containing the project to test
    required: true
  base_branch:
    description: Branch to merge fixes into
    default: main
  helper_dir:
    description: Directory for helper agent sessions
    required: true
  audit:
    description: Run /autoskillit:audit-impl before merge to gate on implementation quality
    default: "true"

steps:
  reset:
    tool: reset_test_dir
    with:
      test_dir: ${{ inputs.test_dir }}
    on_success: test
    on_failure: escalate

  test:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: done
    on_failure: investigate

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the test failures"
      cwd: ${{ inputs.helper_dir }}
      step_name: "investigate"
    on_success: plan
    on_failure: escalate

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify the investigation findings"
      cwd: ${{ inputs.helper_dir }}
      step_name: "plan"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: implement
    on_failure: escalate
    note: >
      Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically into plan_parts[].
      REMEDIATION MODE: when routed from remediate, context.remediation_path is available
      — include it in the skill_command or as context for the rectify skill.

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge the plan"
      cwd: ${{ inputs.helper_dir }}
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    retry:
      max_attempts: 0
      on: needs_retry
      on_exhausted: retry_worktree
    on_success: verify
    on_failure: escalate

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree the plan ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: escalate
    on_success: verify
    on_failure: escalate

  verify:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: audit_impl
    on_failure: assess

  assess:
    tool: run_skill
    model: sonnet
    with:
      skill_command: "/autoskillit:resolve-failures fix test failures"
      cwd: "${{ context.worktree_path }}"
      step_name: "assess"
    on_success: verify
    on_failure: classify
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: classify

  classify:
    tool: classify_fix
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    on_result:
      field: restart_scope
      routes:
        full_restart: investigate
        partial_restart: implement
    on_failure: escalate

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ context.branch_name }} ${{ inputs.base_branch }}"
      cwd: ${{ inputs.helper_dir }}
      step_name: "audit_impl"
    capture:
      verdict: "${{ result.verdict }}"
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      field: verdict
      routes:
        GO: merge
        NO GO: remediate
    on_failure: escalate
    note: Only run if inputs.audit = true. If inputs.audit = false, skip directly to merge.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan

  merge:
    tool: merge_worktree
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_success: done
    on_failure: escalate

  done:
    action: stop
    message: "All tests passing. Fix merged successfully."

  escalate:
    action: stop
    message: "Human intervention needed. Review the latest output for details."
