name: dev-sprint
description: >
  Automate a single development sprint: triage open issues, load the
  implementation-groups recipe for direct orchestration, then create the
  integration review PR. The orchestrator drives all steps with full visibility.
summary: triage > load-impl-groups (direct orchestration) > open-integration-pr
autoskillit_version: "0.3.1"

ingredients:
  source_dir:
    description: Path to the source repository (auto-detected if empty, uses CWD).
    required: false
    default: ""
  base_branch:
    description: Integration branch name to merge implementations into.
    default: integration
  run_name:
    description: Pipeline run name prefix for branch and clone naming.
    default: sprint

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash,
     Agent, WebFetch, WebSearch, NotebookEdit) from the orchestrator. All work
     is delegated through run_skill."
  - "Route to on_failure — never investigate or fix failures directly from the
     orchestrator. The downstream skill handles diagnosis."
  - "After implement (load_recipe) returns: read the implementation-groups
     YAML from the tool result and drive each step directly using the
     orchestrator's kitchen tools. Pass ingredients: source_doc from
     context.triage_manifest, base_branch from inputs.base_branch,
     run_name from inputs.run_name. When all implementation-groups steps
     complete successfully, route to create_pr."
  - "The create_pr step creates the integration PR combining all individual
     issue PRs opened during the implementation-groups execution."

steps:
  triage:
    tool: run_skill
    with:
      skill_command: /autoskillit:triage-issues
      cwd: ${{ inputs.source_dir }}
      step_name: triage
    capture:
      triage_manifest: "${{ result.triage_manifest }}"
    on_success: implement
    on_failure: escalate

  implement:
    tool: load_recipe
    with:
      name: implementation-groups
    on_success: create_pr
    on_failure: escalate

  create_pr:
    tool: run_skill
    with:
      skill_command: "/autoskillit:open-integration-pr ${{ context.triage_manifest }} ${{ inputs.base_branch }}"
      cwd: ${{ inputs.source_dir }}
      step_name: create_pr
    capture:
      pr_url: "${{ result.pr_url }}"
    on_success: done
    on_failure: escalate

  done:
    action: stop
    message: >
      Dev sprint complete. All triaged issue batches have been implemented and
      the integration review PR has been created. Review the PR before merging.
      PR URL: ${{ context.pr_url }}
    with:
      pr_url: "${{ context.pr_url }}"

  escalate:
    action: stop
    message: >
      Dev sprint failed. The pipeline halted at a step that returned failure.
      Check the logs for the failing step and retry after resolving the issue.
