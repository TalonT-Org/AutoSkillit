name: dev-sprint
description: >
  Automate a single development sprint: triage open issues, implement all batches
  via the implementation-groups sub-recipe, then create the integration review PR.
  First consumer of recipe composition (tool: run_recipe).
summary: triage > implement-groups (sub-recipe) > create-review-pr
autoskillit_version: "0.3.1"

ingredients:
  source_dir:
    description: Path to the source repository (auto-detected if empty, uses CWD).
    required: false
    default: ""
  base_branch:
    description: Integration branch name to merge implementations into.
    default: integration
  run_name:
    description: Pipeline run name prefix for branch and clone naming.
    default: sprint

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash,
     Agent, WebFetch, WebSearch, NotebookEdit) from the orchestrator. All work
     is delegated through run_skill or run_recipe."
  - "Route to on_failure — never investigate or fix failures directly from the
     orchestrator. The downstream skill or sub-recipe handles diagnosis."
  - "The implement step runs the full implementation-groups sub-recipe as a
     sub-pipeline. Wait for it to complete before proceeding to create_pr."
  - "The create_pr step creates the integration PR combining all individual issue
     PRs opened by the implementation-groups sub-recipe."

steps:
  triage:
    tool: run_skill
    with:
      skill_command: /autoskillit:triage-issues
      cwd: ${{ inputs.source_dir }}
      step_name: triage
    capture:
      triage_manifest: "${{ result.manifest_path }}"
    on_success: implement
    on_failure: escalate

  implement:
    tool: run_recipe
    with:
      name: implementation-groups
      cwd: ${{ inputs.source_dir }}
      ingredients: >-
        {"source_doc": "${{ context.triage_manifest }}",
         "base_branch": "${{ inputs.base_branch }}",
         "run_name": "${{ inputs.run_name }}",
         "task": "Implement the triaged issue batches per the triage manifest"}
      step_name: implement
    on_success: create_pr
    on_failure: escalate

  create_pr:
    tool: run_skill
    with:
      skill_command: "/autoskillit:create-review-pr ${{ context.triage_manifest }} ${{ inputs.base_branch }}"
      cwd: ${{ inputs.source_dir }}
      step_name: create_pr
    capture:
      pr_url: "${{ result.pr_url }}"
    on_success: done
    on_failure: escalate

  done:
    action: stop
    message: >
      Dev sprint complete. All triaged issue batches have been implemented and
      the integration review PR has been created. Review the PR before merging.
      PR URL: ${{ context.pr_url }}
    with:
      pr_url: "${{ context.pr_url }}"

  escalate:
    action: stop
    message: >
      Dev sprint failed. The pipeline halted at a step that returned failure.
      Check the logs for the failing step and retry after resolving the issue.
