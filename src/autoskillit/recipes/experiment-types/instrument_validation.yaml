dimension_weight_rationale:
  variance_protocol: "Reliability decomposition is the primary deliverable; variance components must be explicitly estimated"
  statistical_corrections: "Multiple fit index comparisons in CFA and competing factor models introduce multiplicity"
  ecological_validity: "Measurement context affects generalizability of psychometric properties; cross-sample invariance is required"
  measurement_alignment: "The entire study purpose is to establish that the instrument measures the intended construct"
  data_acquisition: "Sample size for factor analysis and participant characteristics determine reliability estimate stability"
  agent_implementability: "CFA and IRT pipelines are computationally defined but require psychometric expertise for interpretation"
