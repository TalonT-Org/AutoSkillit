dimension_weight_rationale:
  causal_structure: "Confounders must be enumerated in a DAG; covariate adjustment strategy determines whether associations are interpretable"
  statistical_corrections: "Multiple predictor tests and post-hoc subgroup splits require correction; p-hacking risk is elevated in large-N surveys"
  ecological_validity: "Naturalistic observation maximizes ecological validity; the key question is sample representativeness"
  measurement_alignment: "Self-report scales and archival proxies introduce construct validity threats requiring convergent evidence"
  data_acquisition: "Sampling frame, response rate, and missing-not-at-random mechanisms determine population validity"
