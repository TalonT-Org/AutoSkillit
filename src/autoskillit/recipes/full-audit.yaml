name: full-audit
description: >-
  Run audit-tests, audit-cohesion, audit-arch, audit-feature-gates, and audit-docs in
  parallel, validate each report individually, and create a GitHub issue from each
  validated report.
summary: "branch → audit×5 ∥ → validate×5 ∥ → issue×5 ∥ → done"
autoskillit_version: "0.9.236"
recipe_version: "1.0.0"
requires_packs: [audit, github]

ingredients:
  workspace:
    description: "Path to the git repository workspace"
    required: true
  branch:
    description: "The branch to audit against"
    required: true

kitchen_rules:
  - >-
    NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash, Agent,
    WebFetch, WebSearch, NotebookEdit) from the orchestrator. All work is delegated
    through run_skill.
  - >-
    Each audit chain (tests, cohesion, arch, feature-gates, docs) is independent. A
    failure in one chain MUST NOT block or affect the other four chains. Continue with
    successful chains and note failures for escalation.
  - >-
    Within each wave, fire all run_skill calls in a single message to achieve
    parallelism. Do not serialize audit/validate/issue calls.
  - >-
    Report paths are discovered from session output — look for file paths
    in {{AUTOSKILLIT_TEMP}}/ directories. Pass discovered paths as positional
    arguments to downstream skills.

steps:
  checkout:
    tool: run_cmd
    description: "Check out the target branch"
    with:
      cmd: "git checkout ${{ inputs.branch }}"
      cwd: "${{ inputs.workspace }}"
      step_name: "checkout"
    note: >
      Ensure the working directory is on the target branch before audits run.
      If the checkout fails (e.g., dirty working tree, unknown branch), route
      to escalate — audits cannot proceed on the wrong branch.
    on_success: run_audits
    on_failure: escalate_stop
    retries: 0
    on_exhausted: escalate_stop

  run_audits:
    tool: run_skill
    description: "Run five audit skills in parallel"
    with:
      skill_command: "/autoskillit:audit-tests"
      cwd: "${{ inputs.workspace }}"
      step_name: "run_audits"
    note: >
      PARALLEL AUDIT WAVE — Fire five run_skill calls in a single message:

      1. run_skill(skill_command="/autoskillit:audit-tests", cwd="${{ inputs.workspace }}", step_name="audit_tests")
      2. run_skill(skill_command="/autoskillit:audit-cohesion", cwd="${{ inputs.workspace }}", step_name="audit_cohesion")
      3. run_skill(skill_command="/autoskillit:audit-arch", cwd="${{ inputs.workspace }}", step_name="audit_arch")
      4. run_skill(skill_command="/autoskillit:audit-feature-gates", cwd="${{ inputs.workspace }}", step_name="audit_feature_gates")
      5. run_skill(skill_command="/autoskillit:audit-docs", cwd="${{ inputs.workspace }}", step_name="audit_docs")

      Each audit writes its report to a well-known temp directory:
      - {{AUTOSKILLIT_TEMP}}/audit-tests/{name}_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-cohesion/cohesion_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-arch/arch_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-feature-gates/feature_gate_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-docs/docs_audit_{timestamp}.md

      After all five complete, discover the most-recently-modified .md file in
      each temp directory from the session output. Record which audits succeeded
      and their report paths for the validation wave.

      If any audit fails, note the failure but continue with the other four.
      Proceed to validate_audits even if only one, two, three, or four audits succeeded.
      Route to escalate_stop ONLY if all five audits fail.
    capture_list:
      audit_report_paths: "${{ result.audit_report_path }}"
    on_success: validate_audits
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  validate_audits:
    tool: run_skill
    description: "Validate each audit report in parallel"
    with:
      skill_command: "/autoskillit:validate-audit"
      cwd: "${{ inputs.workspace }}"
      step_name: "validate_audits"
    note: >
      PARALLEL VALIDATION WAVE — For each audit that succeeded in the previous
      wave, fire a run_skill call in a single message. Pass the audit report
      path as a positional argument:

      1. run_skill(skill_command="/autoskillit:validate-audit {tests_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_tests")
      2. run_skill(skill_command="/autoskillit:validate-audit {cohesion_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_cohesion")
      3. run_skill(skill_command="/autoskillit:validate-audit {arch_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_arch")
      4. run_skill(skill_command="/autoskillit:validate-audit {feature_gates_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_feature_gates")
      5. run_skill(skill_command="/autoskillit:validate-audit {docs_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_docs")

      Skip validation for any audit that failed in wave 1.
      Each validation writes to {{AUTOSKILLIT_TEMP}}/validate-audit/:
      - validated_report_{source}_{timestamp}.md (first line: "validated: true")
      - contested_findings_{source}_{timestamp}.md (only if contested > 0)

      After all complete, discover the validated_report_*.md files from session
      output. Record paths for the issue creation wave.

      If any validation fails, note it but continue with the others.
      Route to escalate_stop ONLY if all five validations fail.
    capture_list:
      validated_report_paths: "${{ result.validated_report_path }}"
    on_success: create_issues
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  create_issues:
    tool: run_skill
    description: "Create GitHub issues from validated reports"
    with:
      skill_command: "/autoskillit:prepare-issue"
      cwd: "${{ inputs.workspace }}"
      step_name: "create_issues"
    note: >
      PARALLEL ISSUE CREATION WAVE — validate-audit now splits each validated report
      into per-ticket body files (ticket_body_{source}_{N}_{ts}.md) according to the
      grouping manifest. Instead of passing validated_report_*.md directly, pass each
      ticket body file to prepare-issue:

      For each audit type that succeeded in wave 2:
        1. Discover the grouping manifest (grouping_manifest_{source}_{ts}.md) in the
           validate-audit session output.
        2. Read the manifest to get the list of ticket body file paths.
        3. Fire one run_skill call per ticket body, ALL in a single message:

      Example for tests audit with 3 ticket groups:
        run_skill("/autoskillit:prepare-issue {ticket_body_tests_1_path}", step_name="issue_tests_1")
        run_skill("/autoskillit:prepare-issue {ticket_body_tests_2_path}", step_name="issue_tests_2")
        run_skill("/autoskillit:prepare-issue {ticket_body_tests_3_path}", step_name="issue_tests_3")
        run_skill("/autoskillit:prepare-issue {ticket_body_cohesion_1_path}", step_name="issue_cohesion_1")
        ... (all ticket bodies across all audit types in a single message)

      After all issues are created, append the validation summary to each issue body
      (sequentially): fetch the current body, verify it is non-empty, append a separator
      and the validation summary content, write the combined text to a temp file, then run:
        gh issue edit {issue_number} --body-file {combined_temp_file}

      Collect all issue URLs. If any ticket body issue creation fails, note it but continue.
      Route to escalate_stop ONLY if ALL ticket bodies across ALL audit types fail.
    capture_list:
      issue_urls: "${{ result.issue_url }}"
    on_success: done
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  done:
    action: stop
    message: >-
      Full audit complete. GitHub issues created from validated audit reports.
      Check context.issue_urls for the created issue links and
      {{AUTOSKILLIT_TEMP}}/ for all audit artifacts.

  escalate_stop:
    action: stop
    message: >-
      Full audit pipeline failed — one or more audit chains could not complete.
      Check session logs and {{AUTOSKILLIT_TEMP}}/ directories for partial results.
      Individual chain failures are noted in the session output above.
