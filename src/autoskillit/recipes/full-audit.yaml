name: full-audit
description: >-
  Run audit-tests, audit-cohesion, audit-arch, audit-feature-gates, audit-docs, and
  audit-review-decisions in parallel, validate each report individually, and create a
  GitHub issue from each validated report.
summary: "branch → audit×6 ∥ → validate×6 ∥ → issue×6 ∥ → done"
recipe_version: "1.2.0"
requires_packs: [audit, github]

ingredients:
  workspace:
    description: "Path to the git repository workspace"
    required: true
  branch:
    description: "The branch to audit against"
    required: true
  max_parallel:
    description: "Max audits to run in parallel (half the audit count by default)"
    default: "3"
    hidden: true

kitchen_rules:
  - >-
    NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash, Agent,
    WebFetch, WebSearch, NotebookEdit) from the orchestrator. All work is delegated
    through MCP tools (run_skill, run_cmd, run_python).
  - >-
    Each audit chain (tests, cohesion, arch, feature-gates, docs, review-decisions) is
    independent. A failure in one chain MUST NOT block or affect the other five chains.
    Continue with successful chains and note failures for escalation.
  - >-
    PREFER-COMPLETION SCHEDULING: Maintain up to ${{ inputs.max_parallel }}
    concurrent run_skill calls. When any call completes, immediately dispatch
    the next item from the queue. Do not wait for all slots to finish before
    refilling — fill each freed slot individually.
  - >-
    Report paths are discovered from session output — look for file paths
    in {{AUTOSKILLIT_TEMP}}/ directories. Pass discovered paths as positional
    arguments to downstream skills.

steps:
  checkout:
    tool: run_cmd
    description: "Check out the target branch"
    with:
      cmd: "git checkout ${{ inputs.branch }}"
      cwd: "${{ inputs.workspace }}"
      step_name: "checkout"
    note: >
      Ensure the working directory is on the target branch before audits run.
      If the checkout fails (e.g., dirty working tree, unknown branch), route
      to escalate — audits cannot proceed on the wrong branch.
    on_success: run_audits
    on_failure: escalate_stop
    retries: 0
    on_exhausted: escalate_stop

  run_audits:
    tool: run_skill
    model: ""
    description: "Run six audit skills in parallel"
    with:
      skill_command: "/autoskillit:audit-tests"
      cwd: "${{ inputs.workspace }}"
      step_name: "run_audits"
    note: >
      PREFER-COMPLETION AUDIT DISPATCH — Dispatch audits using prefer-completion
      scheduling capped at ${{ inputs.max_parallel }} concurrent slots:

      1. Queue all six audits:
         - run_skill(skill_command="/autoskillit:audit-tests", cwd="${{ inputs.workspace }}", step_name="audit_tests")
         - run_skill(skill_command="/autoskillit:audit-cohesion", cwd="${{ inputs.workspace }}", step_name="audit_cohesion")
         - run_skill(skill_command="/autoskillit:audit-arch", cwd="${{ inputs.workspace }}", step_name="audit_arch")
         - run_skill(skill_command="/autoskillit:audit-feature-gates", cwd="${{ inputs.workspace }}", step_name="audit_feature_gates")
         - run_skill(skill_command="/autoskillit:audit-docs", cwd="${{ inputs.workspace }}", step_name="audit_docs")
         - run_skill(skill_command="/autoskillit:audit-review-decisions", cwd="${{ inputs.workspace }}", step_name="audit_review_decisions")

      2. Launch the first ${{ inputs.max_parallel }} audits as run_skill calls
         in a single message.

      3. When any audit completes (success or failure), immediately launch
         the next queued audit in the same message as any other pending
         responses. Maintain ${{ inputs.max_parallel }} in-flight at all times
         until the queue is empty.

      Each audit writes its report to a well-known temp directory:
      - {{AUTOSKILLIT_TEMP}}/audit-tests/{name}_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-cohesion/cohesion_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-arch/arch_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-feature-gates/feature_gate_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-docs/docs_audit_{timestamp}.md
      - {{AUTOSKILLIT_TEMP}}/audit-review-decisions/review_decisions_audit_{timestamp}.md

      After all six complete, discover the most-recently-modified .md file in
      each temp directory from the session output. Record which audits succeeded
      and their report paths for the validation wave.

      If any audit fails, note the failure but continue with the other five.
      Proceed to validate_audits even if only one, two, three, four, or five audits succeeded.
      Route to escalate_stop ONLY if all six audits fail.
    capture_list:
      audit_report_paths: "${{ result.audit_report_path }}"
    on_success: validate_audits
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  validate_audits:
    tool: run_skill
    model: ""
    description: "Validate each audit report in parallel"
    with:
      skill_command: "/autoskillit:validate-audit"
      cwd: "${{ inputs.workspace }}"
      step_name: "validate_audits"
    note: >
      PREFER-COMPLETION VALIDATION — Start validating as each audit finishes.
      Do not wait for all audits to complete before beginning validation.

      For each succeeded audit, queue a validation:
        1. run_skill(skill_command="/autoskillit:validate-audit {tests_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_tests")
        2. run_skill(skill_command="/autoskillit:validate-audit {cohesion_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_cohesion")
        3. run_skill(skill_command="/autoskillit:validate-audit {arch_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_arch")
        4. run_skill(skill_command="/autoskillit:validate-audit {feature_gates_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_feature_gates")
        5. run_skill(skill_command="/autoskillit:validate-audit {docs_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_docs")
        6. run_skill(skill_command="/autoskillit:validate-audit {review_decisions_report_path}", cwd="${{ inputs.workspace }}", step_name="validate_review_decisions")

      Apply the same prefer-completion scheduling as run_audits — maintain up
      to ${{ inputs.max_parallel }} concurrent slots across validations. As each
      slot frees, dispatch the next queued validation immediately.

      Skip validation for any audit that failed in the audit dispatch phase.
      Each validation writes to {{AUTOSKILLIT_TEMP}}/validate-audit/:
      - validated_report_{source}_{timestamp}.md (first line: "validated: true")
      - contested_findings_{source}_{timestamp}.md (only if contested > 0)

      After all complete, discover the validated_report_*.md files from session
      output. Record paths for the issue creation wave.

      If any validation fails, note it but continue with the others.
      Route to escalate_stop ONLY if all six validations fail.
    capture_list:
      validated_report_paths: "${{ result.validated_report_path }}"
    on_success: create_issues
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  create_issues:
    tool: run_python
    description: "Batch-create GitHub issues via GraphQL from validated ticket body files"
    with:
      callable: "autoskillit.recipe._cmd_rpc.batch_create_issues"
      workspace: "${{ inputs.workspace }}"
      timeout: 120
    note: >
      BATCHED ISSUE CREATION via GraphQL — The callable discovers all
      ticket_body_{source}_{N}_{ts}.md files in the validate-audit temp directory,
      parses titles and bodies, includes validation summaries, resolves repository
      and label IDs, and executes a single batched createIssue mutation with aliases.
      Chunks at 20 issues per request if needed.

      No headless sessions are spawned. Rate-limit cost: 5 pts per chunk
      (vs 90 pts for 18 sequential REST calls).
    capture:
      issue_urls: "${{ result.issue_urls }}"
      issue_count: "${{ result.issue_count }}"
    on_success: done
    on_failure: escalate_stop
    retries: 1
    on_exhausted: escalate_stop

  done:
    action: stop
    message: >-
      Full audit complete. GitHub issues created from validated audit reports.
      Emit the L3 result sentinel. context.issue_urls is a comma-separated
      string of the created issue URLs — include it directly in the sentinel JSON:
      {"success": true, "reason": "completed", "summary": "Full audit complete.
      GitHub issues created.", "issue_urls": "${{ context.issue_urls }}"}
      Artifacts are in {{AUTOSKILLIT_TEMP}}/.

  escalate_stop:
    action: stop
    message: >-
      Full audit pipeline failed — one or more audit chains could not complete.
      Check session logs and {{AUTOSKILLIT_TEMP}}/ directories for partial results.
      Individual chain failures are noted in the session output above.
