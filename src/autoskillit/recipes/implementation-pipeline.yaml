name: implementation-pipeline
description: Plan, verify, implement, test, and merge a task end-to-end. Optionally decompose a large document into sequenced groups first. Use when user says "run pipeline", "implement task", or "auto implement".
summary: clone > (make-groups?) > make-plan > (review-approach?) > dry-walkthrough > implement > test > (audit-impl?) > merge > push > cleanup (per group, per plan part)
autoskillit_version: "0.2.0"

ingredients:
  task:
    description: Description of what to implement (required when make_groups is false)
    required: false
  source_doc:
    description: Path to source document for group decomposition (required when make_groups is true)
    required: false
  source_dir:
    description: >
      Path to the source repository to clone and work in.
      Leave empty to auto-detect from git rev-parse --show-toplevel.
    required: false
    default: ""
  run_name:
    description: Name prefix for this pipeline run (used in clone directory name)
    default: "impl"
  keep_clone_on_failure:
    description: Keep the clone directory when the pipeline fails (true/false)
    default: "false"
  base_branch:
    description: Branch to merge into (defaults to current branch)
    default: main
  make_groups:
    description: Run /make-groups to decompose source_doc into sequenced implementation groups? (true/false)
    default: "false"
  review_approach:
    description: Run /review-approach before implementation? (true/false)
    default: "false"
  audit:
    description: Run /autoskillit:audit-impl once after all groups/parts have been merged, to check overall implementation quality and optionally trigger a remediation round (true/false)
    default: "true"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill/run_skill_retry."
  - "Route to on_failure — never investigate or fix directly from the orchestrator."
  - "When make_groups is false, task input is required."
  - "When make_groups is true, source_doc input is required."
  - "Process plan parts and groups sequentially. Complete the full cycle (verify → implement → test → merge) for one part before starting the next. Do NOT run verify for all parts upfront."

steps:
  clone:
    tool: clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
      branch: "${{ inputs.base_branch }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      source_dir: "${{ result.source_dir }}"
    on_success: group
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir context used by all subsequent steps as cwd.
      On failure, escalate_stop is reached immediately (no clone to remove).

  group:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-groups ${{ inputs.source_doc }}"
      cwd: "${{ context.work_dir }}"
      step_name: "group"
    capture:
      group_files: "${{ result.group_files }}"
    on_success: plan
    on_failure: cleanup_failure
    note: >
      Only execute if make_groups input is 'true'. Otherwise skip directly to plan.
      Produces group files in temp/make-groups/ containing sequenced groups (groupA, groupB, ...).
      GROUPS MODE: Pass the file paths (group_files) directly to the plan step via context.group_files
      — do NOT read the files. The current group's file path becomes the task passed to the plan step.
      ITERATION: The agent maintains a group queue. For each group, run the full cycle
      (plan → review → verify → implement → test → merge) before advancing to the next group.

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan ${{ inputs.task }}"
      cwd: "${{ context.work_dir }}"
      step_name: "plan"
      group_files: "${{ context.group_files }}"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: review
    on_failure: cleanup_failure
    note: >
      Produces plan in temp/make-plan/. Glob plan_dir for *_part_*.md or single plan file.
      plan_parts context key contains the full ordered list of part files (sorted alphabetically).
      For a single-part plan, plan_parts has one entry equal to plan_path.
      GROUPS MODE: When running with groups, replace ${{ inputs.task }} with the current
      group's file path from context.group_files extracted from the group step's capture
      — do NOT read the file; pass the path directly to the skill.
      REMEDIATION MODE: context.remediation_path is available when the orchestrator
      re-enters plan from the remediate step; pass it inline in the skill_command
      rather than as a named with: key.

  review:
    tool: run_skill
    with:
      skill_command: "/autoskillit:review-approach ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "review"
    capture:
      review_path: "${{ result.review_path }}"
    on_success: verify
    on_failure: cleanup_failure
    note: "Only execute this step if review_approach input is 'true'. Otherwise skip directly to verify."

  verify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:dry-walkthrough ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "verify"
      review_path: "${{ context.review_path }}"
    on_success: implement
    on_failure: cleanup_failure
    note: "SEQUENTIAL EXECUTION: For each plan_part, run the FULL cycle — verify → implement → test → merge — for that part before advancing to the next part. Never run verify for all parts first. If review produced a report, context.review_path is available — pass it as an additional arg to dry-walkthrough."

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    on_success: test
    on_failure: cleanup_failure
    retry:
      max_attempts: 0
      on: needs_retry
      on_exhausted: retry_worktree
    note: "Extracts worktree_path and branch_name from result for use in subsequent steps."

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    on_success: test
    on_failure: cleanup_failure
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge
    on_failure: fix

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ inputs.base_branch }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_success: push
    on_failure: cleanup_failure
    note: >
      After merge, push changes back to source_dir via the push step.
      GROUPS MODE: When all plan_parts for the current group are merged, advance to the
      next group (back to plan step with the next group's description). When all groups
      are complete, go to done.

  push:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      source_dir: "${{ context.source_dir }}"
      branch: "${{ inputs.base_branch }}"
    on_success: next_or_done
    on_failure: cleanup_failure
    note: >
      Pushes the merged base_branch directly from the clone to the upstream remote.
      Reads the remote URL from source_dir (read-only) and pushes from clone_path,
      preserving clone isolation — source_dir is never modified.
      On failure, cleanup_failure still removes the clone.

  fix:
    tool: run_skill
    model: sonnet
    with:
      skill_command: "/autoskillit:assess-and-merge ${{ context.worktree_path }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "fix"
    on_success: next_or_done
    on_failure: cleanup_failure
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure
    note: "Attempts to fix test failures and merge. After 3 failed attempts, routes to cleanup_failure."

  next_or_done:
    action: route
    on_result:
      field: next
      routes:
        more_parts: verify
        more_groups: plan
        all_done: audit_impl
    note: >
      Routing step — no tool call. The agent evaluates what comes next:
      1. If more plan_parts remain for the current group → go to verify with next part.
      2. If all plan_parts done but more groups remain → go to plan with next group's task.
      3. If all groups (or single task) complete → go to audit_impl.

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ context.branch_name }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit_impl"
    capture:
      verdict: "${{ result.verdict }}"
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      field: verdict
      routes:
        GO: cleanup_success
        NO GO: remediate
    on_failure: escalate_stop
    optional: true
    note: >
      Only execute if inputs.audit is 'true'. If false, skip directly to cleanup_success.
      Captures verdict and remediation_path. Routes GO → cleanup_success, NO GO → remediate
      which re-enters the plan step with the remediation file.
      All groups and parts have been merged at this point — no worktree exists.
      Uses context.branch_name (stable git ref) as implementation_ref so audit-impl
      can diff even after merge_worktree has deleted the worktree directory.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan

  cleanup_success:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "false"
    on_success: done
    on_failure: done
    note: >
      Removes the clone directory after a successful pipeline run.
      Routes to done regardless of whether removal succeeds — a cleanup
      failure should not mask a successful pipeline.

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "${{ inputs.keep_clone_on_failure }}"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Called on any pipeline failure where the clone was created.
      Respects keep_clone_on_failure ingredient for debugging.
      Always routes to escalate_stop.

  done:
    action: stop
    message: "Implementation pipeline complete. All groups/tasks have been planned, implemented, tested, and merged."

  escalate_stop:
    action: stop
    message: "Pipeline failed — human intervention needed. Check the worktree and plan for details."
