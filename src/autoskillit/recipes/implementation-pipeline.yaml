name: implementation-pipeline
description: Plan, verify, implement, test, and merge a task end-to-end. Optionally decompose a large document into sequenced groups first. Use when user says "run pipeline", "implement task", or "auto implement".
summary: (make-groups?) > make-plan > (review-approach?) > dry-walkthrough > implement > test > (audit-impl?) > merge (per group, per plan part)
autoskillit_version: "0.2.0"

ingredients:
  task:
    description: Description of what to implement (required when make_groups is false)
    required: false
  source_doc:
    description: Path to source document for group decomposition (required when make_groups is true)
    required: false
  project_dir:
    description: Path to the project
    required: true
  work_dir:
    description: Working directory (can be same as project_dir)
    required: true
  base_branch:
    description: Branch to merge into (defaults to current branch)
    default: main
  make_groups:
    description: Run /make-groups to decompose source_doc into sequenced implementation groups? (true/false)
    default: "false"
  review_approach:
    description: Run /review-approach before implementation? (true/false)
    default: "false"
  audit:
    description: Run /autoskillit:audit-impl before each merge to gate on implementation quality (true/false)
    default: "false"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill/run_skill_retry."
  - "Route to on_failure — never investigate or fix directly from the orchestrator."
  - "When make_groups is false, task input is required."
  - "When make_groups is true, source_doc input is required."
  - "Process plan parts and groups sequentially. Complete the full cycle (verify → implement → test → merge) for one part before starting the next. Do NOT run verify for all parts upfront."

steps:
  group:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-groups ${{ inputs.source_doc }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "group"
    capture:
      group_files: "${{ result.group_files }}"
    on_success: plan
    on_failure: escalate
    note: >
      Only execute if make_groups input is 'true'. Otherwise skip directly to plan.
      Captures group_files: a list of per-group file paths. Maintain a group queue from
      context.group_files. For each iteration, pop the next path and pass it to the plan
      step. Pass the FILE PATH — the headless session reads it. No file reading in the orchestrator.

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan ${{ inputs.task }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "plan"
      group_files: "${{ context.group_files }}"
    capture:
      plan_path: "${{ result.plan_path }}"
    on_success: review
    on_failure: escalate
    note: >
      Produces plan in temp/make-plan/. Glob plan_dir for *_part_*.md or single plan file.
      Sort alphabetically into plan_parts[].
      GROUPS MODE: use the next path from context.group_files as the make-plan argument.
      Pass the FILE PATH directly. No content extraction in the orchestrator.
      REMEDIATION MODE: when context.remediation_path is set (after audit_impl NO GO),
      pass it as the make-plan task argument instead of inputs.task.

  review:
    tool: run_skill
    with:
      skill_command: "/autoskillit:review-approach ${{ context.plan_path }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "review"
    capture:
      review_path: "${{ result.review_path }}"
    on_success: verify
    on_failure: escalate
    note: "Only execute this step if review_approach input is 'true'. Otherwise skip directly to verify."

  verify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:dry-walkthrough ${{ context.plan_path }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "verify"
      review_path: "${{ context.review_path }}"
    on_success: implement
    on_failure: escalate
    note: "SEQUENTIAL EXECUTION: For each plan_part, run the FULL cycle — verify → implement → test → merge — for that part before advancing to the next part. Never run verify for all parts first."

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.plan_path }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    on_success: test
    on_failure: escalate
    retry:
      max_attempts: 1
      on: needs_retry
      on_exhausted: retry_worktree
    note: "Extracts worktree_path from result for use in subsequent steps."

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    on_success: test
    on_failure: escalate
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: escalate

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge
    on_failure: fix

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ inputs.base_branch }}"
    on_success: next_or_done
    on_failure: escalate
    note: >
      After merge, continue to next plan_part (back to verify step) if more parts remain.
      GROUPS MODE: When all plan_parts for the current group are merged, advance to the
      next group (back to plan step with the next group's description). When all groups
      are complete, go to done.

  fix:
    tool: run_skill
    model: sonnet
    with:
      skill_command: "/autoskillit:assess-and-merge ${{ context.worktree_path }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "fix"
    on_success: next_or_done
    on_failure: escalate
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: escalate
    note: "Attempts to fix test failures and merge. After 3 failed attempts, escalates."

  next_or_done:
    action: route
    on_result:
      field: next
      routes:
        more_parts: verify
        more_groups: plan
        all_done: audit_impl
    note: >
      Routing step — no tool call. The agent evaluates what comes next:
      1. If more plan_parts remain for the current group → go to verify with next part.
      2. If all plan_parts done but more groups remain → go to plan with next group's task.
      3. If all groups (or single task) complete → go to audit_impl.

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ inputs.work_dir }} ${{ inputs.base_branch }}"
      cwd: "${{ inputs.work_dir }}"
      step_name: "audit_impl"
    capture:
      remediation_path: "${{ result.remediation_path }}"
    on_success: done
    on_failure: remediate
    optional: true
    note: >
      Only execute if inputs.audit is 'true'. If false, skip directly to done.
      All groups and parts have been merged at this point — no worktree exists.
      For plans_input: if make_groups was true, pass context.group_files (the ordered list of
      per-group file paths). For manifest-level audit-impl contract, see Part B.
      Otherwise pass context.plan_path (or the temp/make-plan/ directory for multi-part plans).
      For implementation_ref: pass inputs.base_branch — the skill will run
      git diff against the upstream of that branch to capture everything merged.
      On NO GO: the skill generates a remediation file in temp/audit-impl/. Pass that
      remediation file path as the task to the plan step for another full cycle.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan
    on_failure: escalate
    note: >
      Routing step after audit_impl NO GO. Threads context.remediation_path to the plan step.
      The plan step will use context.remediation_path as the task argument instead of inputs.task.

  done:
    action: stop
    message: "Implementation pipeline complete. All groups/tasks have been planned, implemented, tested, and merged."

  escalate:
    action: stop
    message: "Pipeline failed — human intervention needed. Check the worktree and plan for details."
