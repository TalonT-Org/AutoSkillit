name: implementation
description: Plan, verify, implement, test, and merge a task end-to-end. Use when user says "run pipeline", "implement task", or "auto implement".
summary: "[sprint: triage > plan > confirm > dispatch > report] | clone > capture_base_sha > set_merge_target > (create_branch?) > make-plan > (review-approach?) > dry-walkthrough > implement > test > merge (per plan part) > (audit-impl?) > (open_pr?) > push > cleanup"
autoskillit_version: "0.3.0"

ingredients:
  task:
    description: What to implement
    required: true
  source_dir:
    description: Source repository
    required: false
    default: ""
  run_name:
    description: Run name prefix
    default: "impl"
  base_branch:
    description: Merge target
    default: ""
  review_approach:
    description: Research approaches first
    default: "false"
  audit:
    description: Post-merge quality gate
    default: "true"
  open_pr:
    description: PR instead of direct merge
    default: "true"
  auto_merge:
    description: >-
      Automatically merge the PR after required checks pass —
      via merge queue when available, direct merge otherwise
    default: "true"
  issue_url:
    description: GitHub issue to close on merge
    required: false
  sprint_mode:
    description: Enable sprint sub-recipe prefix (triage → sprint selection → per-issue dispatch)
    default: "false"
    hidden: true
  upfront_claimed:
    description: "Set to 'true' when process-issues has already claimed this issue upfront. Allows claim_issue defense step to pass through without aborting."
    default: "false"
  run_mode:
    description: >-
      Execution mode when processing multiple issues. Options: sequential (default,
      one issue at a time) or parallel (all issues simultaneously with wavefront
      step scheduling — fast steps for all pipelines before any slow step).
    default: "sequential"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill."
  - "Route to on_failure — never investigate or fix directly from the orchestrator."
  - "Process plan parts sequentially. Complete the full cycle (verify → implement → test → merge) for one part before starting the next. Do NOT run verify for all parts upfront."
  - "By default (open_pr=true), a feature branch is created with a unique name
    derived from inputs.run_name and context.issue_number (e.g. impl/124) or
    a date suffix (e.g. impl/20260304) when no issue is available. All worktree
    merges target the feature branch (context.merge_target), not base_branch
    directly. The push step publishes the feature branch, then open_pr_step
    opens a PR to base_branch. When open_pr=false, merges target base_branch
    directly and open_pr_step is skipped."
  - "SOURCE ISOLATION: After clone_repo returns, the source_dir is strictly
    off-limits. Never run any command in source_dir — no git checkout, git
    fetch, git reset, git pull, run_cmd, run_skill, or any other operation.
    All work — skill invocations, git operations, file reads — happens
    exclusively in the clone (work_dir). source_dir is used ONLY to read
    the remote URL inside push_to_remote."
  - "MERGE ROUTING: check_merge_queue detects whether the target branch has an active
    merge queue (GraphQL). check_auto_merge detects whether autoMergeAllowed is enabled.
    route_queue_mode then routes to: enable_auto_merge → wait_for_queue (queue path);
    direct_merge → wait_for_direct_merge (no queue, autoMergeAllowed=true); or
    immediate_merge → wait_for_immediate_merge (no queue, autoMergeAllowed=false).
    Never call gh pr merge directly via run_cmd — all merges go through these named
    recipe steps so CI enforcement and conflict routing are preserved."

steps:
  sprint_entry:
    sub_recipe: sprint-prefix
    gate: sprint_mode
    on_success: done
    on_failure: escalate_stop
    note: >
      Sprint sub-recipe entry point. When sprint_mode=true, the sprint-prefix
      sub-recipe steps are merged here and handle the full multi-issue workflow
      (triage → planning → user approval → per-issue dispatch → report).
      When sprint_mode=false (default), this step is dropped at load time and
      the recipe starts at 'clone' as usual.

  clone:
    tool: clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
      branch: "${{ inputs.base_branch }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      remote_url: "${{ result.remote_url }}"
    on_success: capture_base_sha
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir context used by all subsequent steps as cwd.
      On failure, escalate_stop is reached immediately (no clone to remove).

  capture_base_sha:
    tool: run_cmd
    with:
      cmd: "git -C ${{ context.work_dir }} rev-parse ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "capture_base_sha"
    capture:
      base_sha: "${{ result.stdout | trim }}"
    on_success: set_merge_target
    on_failure: escalate_stop
    note: >
      Capture the SHA of base_branch before any merge begins. A commit SHA names
      a git object (not a ref), so it survives git branch -D unconditionally. This
      SHA is passed to audit_impl as implementation_ref to diff the full
      implementation against the pre-implementation state.

  set_merge_target:
    tool: run_cmd
    with:
      cmd: "printf '%s' '${{ inputs.base_branch }}'"
      cwd: "${{ context.work_dir }}"
      step_name: "set_merge_target"
    capture:
      merge_target: "${{ result.stdout }}"
    on_success: get_issue_title
    on_failure: escalate_stop
    note: >
      Unconditionally sets merge_target to inputs.base_branch as a fallback.
      In the standard flow (open_pr=true), the subsequent create_branch step
      overrides merge_target with the feature branch name. When open_pr=false,
      create_branch is skipped and this fallback stands. This eliminates the
      undefined-context-variable gap that existed when create_branch was optional.

  get_issue_title:
    tool: get_issue_title
    with:
      issue_url: "${{ inputs.issue_url }}"
    capture:
      issue_number: "${{ result.number }}"
      issue_title: "${{ result.title }}"
      issue_slug: "${{ result.slug }}"
    on_success: claim_issue
    on_failure: escalate_stop
    optional: true
    skip_when_false: "inputs.issue_url"
    note: >
      Runs when inputs.issue_url is non-empty. Skipped otherwise.
      Fetches only the issue title and slug (no body, no comments).
      issue_number is used for feature branch naming and threaded to
      open_pr_step for "Closes #N" in the PR body.
      issue_slug provides a descriptive branch prefix (e.g. fix-merge-conflict-triage).

  claim_issue:
    description: "Claim this issue with the in-progress label to prevent parallel work"
    tool: claim_issue
    optional: true
    skip_when_false: inputs.issue_url
    with:
      issue_url: ${{ inputs.issue_url }}
      allow_reentry: ${{ inputs.upfront_claimed }}
    capture:
      claimed: "${{ result.claimed }}"
    on_result:
      - when: "${{ result.claimed }} == true"
        route: compute_branch
      - route: escalate_stop
    on_failure: escalate_stop

  compute_branch:
    tool: run_cmd
    with:
      cmd: >-
        SLUG="${{ context.issue_slug }}" &&
        RUN="${{ inputs.run_name }}" &&
        PREFIX="${SLUG:-$RUN}" &&
        ISSUE="${{ context.issue_number }}" &&
        if [ -n "$ISSUE" ]; then
          printf '%s' "${PREFIX}/${ISSUE}"
        else
          printf '%s' "${PREFIX}/$(date +%Y%m%d)"
        fi
      cwd: "${{ context.work_dir }}"
      step_name: "compute_branch"
    capture:
      proposed_branch: "${{ result.stdout | trim }}"
    on_success: create_branch
    on_failure: release_issue_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Computes the proposed branch name from slug/issue or slug/date — no git operations.
      Result is passed to create_branch for atomic collision check and checkout.

  create_branch:
    tool: create_unique_branch
    with:
      base_branch_name: "${{ context.proposed_branch }}"
      cwd: "${{ context.work_dir }}"
    capture:
      merge_target: "${{ result.branch_name }}"
    on_success: push_merge_target
    on_failure: release_issue_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Atomic branch creation: ls-remote collision check → checkout -b. Uses the
      create_unique_branch MCP tool so the orchestrator cannot insert extra git fetch
      or checkout calls between the collision check and branch creation.

  push_merge_target:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: plan
    on_failure: release_issue_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs by default (open_pr=true). Skipped when open_pr=false.
      Publishes the feature branch to origin before any merge_worktree call.
      merge_worktree requires refs/remotes/origin/{branch} to exist after fetch (step 5.5).
      Without this step, merge_worktree fails with WORKTREE_INTACT_BASE_NOT_PUBLISHED.
      Uses the pre-resolved remote_url from the clone step to preserve clone isolation.

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan ${{ inputs.task }}"
      cwd: "${{ context.work_dir }}"
      step_name: "plan"
      issue_url: "${{ inputs.issue_url }}"
      issue_title: "${{ context.issue_title }}"
    capture:
      plan_path: "${{ result.plan_path }}"
      all_plan_paths: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: review
    on_failure: release_issue_failure
    note: >
      Produces plan in .autoskillit/temp/make-plan/. Glob plan_dir for *_part_*.md or single plan file.
      plan_parts context key contains the full ordered list of part files (sorted alphabetically).
      For a single-part plan, plan_parts has one entry equal to plan_path.
      REMEDIATION MODE: context.remediation_path is available when the orchestrator
      re-enters plan from the remediate step; pass it inline in the skill_command
      rather than as a named with: key.
      ACCUMULATION: all_plan_paths accumulates across any re-entries to the plan step
      (e.g. remediation). For a single-pass run, all_plan_paths equals plan_path
      (the capture block handles this automatically).
      ISSUE CONTEXT: If inputs.issue_url is a non-empty string, append it to the
      skill_command so the make-plan skill can detect and fetch the issue itself:
      "/autoskillit:make-plan {task}\n\nGitHub Issue: {inputs.issue_url}"
      The skill detects the URL pattern and calls fetch_github_issue internally.

  review:
    tool: run_skill
    with:
      skill_command: "/autoskillit:review-approach ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "review"
    capture:
      review_path: "${{ result.review_path }}"
    retries: 1
    on_success: verify
    on_failure: release_issue_failure
    on_context_limit: verify
    skip_when_false: "inputs.review_approach"
    note: "Only execute this step if review_approach input is 'true'. Otherwise skip directly to verify."

  verify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:dry-walkthrough ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "verify"
      review_path: "${{ context.review_path }}"
    on_success: implement
    on_failure: release_issue_failure
    note: "SEQUENTIAL EXECUTION: For each plan_part, run the FULL cycle — verify → implement → test → merge — for that part before advancing to the next part. Never run verify for all parts first. If review produced a report, context.review_path is available — pass it as an additional arg to dry-walkthrough."

  implement:
    tool: run_skill
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    retries: 0
    on_context_limit: retry_worktree
    on_success: test
    on_failure: release_issue_failure
    note: "Extracts worktree_path from result for use in subsequent steps."

  retry_worktree:
    tool: run_skill
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    on_exhausted: release_issue_failure
    on_success: test
    on_failure: release_issue_failure

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge
    on_failure: fix

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ context.merge_target }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
      worktree_path: "${{ result.worktree_path }}"
    on_result:
      - when: "result.failed_step == 'dirty_tree'"
        route: fix
      - when: "result.failed_step == 'test_gate'"
        route: fix
      - when: "result.failed_step == 'post_rebase_test_gate'"
        route: fix
      - when: "result.failed_step == 'rebase'"
        route: fix
      - when: "result.error"
        route: release_issue_failure
      - route: next_or_done
    on_failure: release_issue_failure
    note: >
      After merge, route to next_or_done to process remaining parts before pushing.
      By default (open_pr=true), merge_target is the feature branch named from run_name.
      When open_pr=false, merge_target equals base_branch — merges go directly to base.
      dirty_tree and test_gate failures route to fix (resolve-failures) for recovery;
      all other failures route to cleanup_failure.

  push:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: open_pr_step
    on_failure: release_issue_failure
    note: >
      Runs once at the end, after audit_impl passes.
      Pushes merge_target branch from the clone to the upstream remote.
      By default (open_pr=true), this pushes the feature branch; when open_pr=false, pushes base_branch.
      Uses the pre-resolved remote_url captured at clone time, preserving clone isolation.
      On success, routes to open_pr_step (which opens the PR by default; skipped when open_pr=false).
      On failure, cleanup_failure still removes the clone.

  fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-failures ${{ context.worktree_path }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "fix"
    on_success: test
    on_failure: release_issue_failure
    on_context_limit: test
    note: "Fixes test failures without merging. Routes back to test for re-validation before merge_worktree. on_context_limit routes needs_retry=True to test (worktree may already be green) instead of re-running fix blindly."

  next_or_done:
    action: route
    on_result:
      - when: "${{ result.next }} == more_parts"
        route: verify
      - route: audit_impl
    note: >
      Routing step — no tool call. The agent evaluates what comes next:
      1. If more plan_parts remain for the current plan → go to verify with next part.
      2. If all plan_parts are complete → go to audit_impl.

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ context.base_sha }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit_impl"
    capture:
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      - when: "${{ result.verdict }} == GO"
        route: push
      - when: "result.error"
        route: escalate_stop
      - route: remediate
    on_failure: escalate_stop
    on_context_limit: escalate_stop
    optional: true
    skip_when_false: "inputs.audit"
    note: >
      Only execute if inputs.audit is 'true'. If false, skip directly to push.
      Captures verdict and remediation_path. Routes GO → push, NO GO → remediate
      which re-enters the plan step with the remediation file.
      All parts have been merged at this point — no worktree exists.
      Uses context.base_sha (a stable commit SHA captured before any merge began)
      as implementation_ref. A SHA names a git object and survives git branch -D
      unconditionally. The diff git diff base_sha..base_branch (two-dot, SHA on the
      left) covers the full implementation.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan

  open_pr_step:
    tool: run_skill
    with:
      skill_command: "/autoskillit:open-pr ${{ context.all_plan_paths }} ${{ inputs.run_name }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "open_pr"
      issue_number: "${{ context.issue_number }}"
    on_success: extract_pr_number
    on_failure: release_issue_failure
    on_context_limit: release_issue_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs by default (open_pr=true). Skipped when open_pr=false.
      The feature branch is already published by the push step that precedes this step.
      Invokes the open-pr skill which selects arch-lens diagrams, composes a PR body,
      and runs gh pr create. The skill gracefully degrades if gh is unavailable.
      If context.issue_number is a non-empty string (set by fetch_issue), append it
      as a 4th positional argument to the skill_command. The open-pr skill will insert
      "Closes #{issue_number}" into the PR body to auto-close the issue on merge.

  extract_pr_number:
    tool: run_cmd
    with:
      cmd: "gh pr view '${{ context.merge_target }}' --json number -q .number"
      cwd: "${{ context.work_dir }}"
      step_name: "extract_pr_number"
    capture:
      pr_number: "${{ result.stdout | trim }}"
    on_success: review_pr
    on_failure: release_issue_failure
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Extracts the integer PR number from the feature branch opened by open_pr_step.
      pr_number is required by the queue finale steps (enable_auto_merge, wait_for_queue).

  review_pr:
    tool: run_skill
    with:
      skill_command: "/autoskillit:review-pr ${{ context.merge_target }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "review_pr"
    capture:
      verdict: "${{ result.verdict }}"
    on_result:
      - when: "${{ result.verdict }} == changes_requested"
        route: resolve_review
      - when: "${{ result.verdict }} == needs_human"
        route: ci_watch
      - when: "true"
        route: ci_watch
    on_failure: resolve_review
    on_context_limit: ci_watch
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs after open_pr_step creates the PR. Invokes the review-pr skill as a
      headless session to leave inline review comments on the PR. The skill finds
      the open PR by feature branch name (context.merge_target). Captures verdict
      and routes via on_result: changes_requested → resolve_review,
      needs_human → ci_watch (explicit), approved → ci_watch. On tool-level failure (MCP error, gh
      unavailable), routes to resolve_review. Skipped when open_pr=false.

  resolve_review:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-review ${{ context.merge_target }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "resolve_review"
    retries: 2
    on_exhausted: release_issue_failure
    on_success: re_push_review
    on_failure: release_issue_failure
    note: >
      Runs when review_pr reports issues (verdict=changes_requested). The clone
      (context.work_dir) has the feature branch (context.merge_target) checked out.
      resolve-review fetches inline and summary review comments via the GitHub API,
      applies fixes for each actionable finding (critical + warning severity), and
      commits each fix. Orchestrator re-pushes via re_push_review after success.
      Retries up to 2 times (3 total attempts) before exhausting to release_issue_failure.

  re_push_review:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: ci_watch
    on_failure: release_issue_failure
    note: >
      Pushes the review-fixed feature branch back to the remote after resolve_review
      succeeds. Routes to ci_watch to validate via CI (one-shot review gate).
      On push failure, escalates via release_issue_failure.

  ci_watch:
    tool: wait_for_ci
    with:
      branch: "${{ context.merge_target }}"
      workflow: "tests.yml"
      timeout_seconds: 300
      cwd: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
    capture:
      ci_conclusion: "${{ result.conclusion }}"
      ci_failed_jobs: "${{ result.failed_jobs }}"
    on_success: check_merge_queue
    on_failure: detect_ci_conflict
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Waits for the GitHub Actions CI run on context.merge_target to complete
      using the wait_for_ci MCP tool (timeout: 300 s). Captures structured output
      (conclusion + failed job names) for downstream resolve_ci.
      Skipped when open_pr=false — no remote feature branch is opened in that mode.
      On success, routes to check_merge_queue to determine if the PR should enter
      the merge queue. On failure, routes to detect_ci_conflict which checks whether
      the failure is caused by a stale base before falling through to diagnose_ci.

  check_merge_queue:
    tool: run_cmd
    with:
      cmd: >
        REPO=$( { git remote get-url upstream 2>/dev/null || git remote get-url origin; } | sed 's|.*github\.com[:/]||; s|\.git$||') &&
        OWNER=${REPO%%/*} && REPO_NAME=${REPO##*/} &&
        BRANCH="${{ inputs.base_branch }}" &&
        gh api graphql -f query="query {
          repository(owner:\"$OWNER\", name:\"$REPO_NAME\") {
            mergeQueue(branch:\"$BRANCH\") { id }
          }
        }" | jq -r 'if .data.repository.mergeQueue != null then "true" else "false" end'
      cwd: "${{ context.work_dir }}"
      step_name: "check_merge_queue"
    capture:
      queue_available: "${{ result.stdout | trim }}"
    on_success: check_auto_merge
    on_failure: release_issue_success
    skip_when_false: "inputs.open_pr"
    note: >
      Detects whether the target branch has an active merge queue via GraphQL.
      Captures "true" or "false" into context.queue_available.
      On failure (gh error, parse error), degrades gracefully to release_issue_success
      (non-queue path). On success, routes to check_auto_merge for auto-merge
      availability detection. Skipped when open_pr=false — no PR was opened.

  check_auto_merge:
    tool: run_cmd
    with:
      cmd: >
        REPO=$( { git remote get-url upstream 2>/dev/null || git remote get-url origin; } | sed 's|.*github\.com[:/]||; s|\.git$||') &&
        OWNER=${REPO%%/*} && REPO_NAME=${REPO##*/} &&
        gh api graphql -f query="query {
          repository(owner:\"$OWNER\", name:\"$REPO_NAME\") {
            autoMergeAllowed
          }
        }" | jq -r '.data.repository.autoMergeAllowed // false'
      cwd: "${{ context.work_dir }}"
      step_name: "check_auto_merge"
    capture:
      auto_merge_available: "${{ result.stdout | trim }}"
    on_success: route_queue_mode
    on_failure: route_queue_mode
    skip_when_false: "inputs.open_pr"
    note: >
      Detects whether the target repository has autoMergeAllowed enabled via GraphQL.
      Captures "true" or "false" into context.auto_merge_available.
      On failure (gh error, network error), falls through to route_queue_mode with
      auto_merge_available unset — route_queue_mode defaults to immediate_merge (safe
      non-auto path). GraphQL-level errors (rate-limit, missing auth scope) also return
      exit 0 with an errors array and no .data field; the jq // false fallback outputs
      false safely, so auto_merge_available defaults to false on any error path.
      Skipped when open_pr=false — no PR was opened.

  route_queue_mode:
    action: route
    on_result:
      - when: "${{ inputs.auto_merge }} != 'true'"
        route: confirm_cleanup
      - when: "${{ context.queue_available }} == true"
        route: enable_auto_merge
      - when: "${{ context.auto_merge_available }} == true"
        route: direct_merge
      - route: immediate_merge
    skip_when_false: "inputs.open_pr"

  enable_auto_merge:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash --auto"
      cwd: "${{ context.work_dir }}"
      step_name: "enable_auto_merge"
    on_success: wait_for_queue
    on_failure: confirm_cleanup
    skip_when_false: "inputs.open_pr"
    note: >
      Submits the PR to the merge queue. On failure (PR not mergeable, already merged),
      degrades to confirm_cleanup.

  wait_for_queue:
    tool: wait_for_merge_queue
    with:
      pr_number: "${{ context.pr_number }}"
      target_branch: "${{ inputs.base_branch }}"
      timeout_seconds: 900
      cwd: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
    capture:
      queue_pr_state: "${{ result.pr_state }}"
    on_result:
      - when: "${{ result.pr_state }} == merged"
        route: release_issue_success
      - when: "${{ result.pr_state }} == ejected"
        route: queue_ejected_fix
      - when: "${{ result.pr_state }} == stalled"
        route: reenroll_stalled_pr
      - when: "${{ result.pr_state }} == timeout"
        route: release_issue_timeout
      - route: release_issue_timeout
    on_failure: release_issue_timeout
    skip_when_false: "inputs.open_pr"
    note: >
      Waits up to 15 minutes for the PR to merge through the queue.
      merged → release_issue_success to transition issue state then confirm_cleanup.
      ejected → conflict fix cycle then re-enter.
      stalled → lightweight re-enrollment (disable then re-enable auto-merge).
      timeout → release_issue_timeout (release claim without staged label; merge unconfirmed).

  reenroll_stalled_pr:
    tool: toggle_auto_merge
    with:
      pr_number: "${{ context.pr_number }}"
      target_branch: "${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
    on_success: wait_for_queue
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"

  queue_ejected_fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-merge-conflicts ${{ context.work_dir }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "queue_ejected_fix"
    capture:
      conflict_escalation_required: "${{ result.escalation_required }}"
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: release_issue_failure
      - route: re_push_queue_fix
    on_failure: release_issue_failure
    on_context_limit: release_issue_failure
    retries: 1
    on_exhausted: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Resolves rebase conflicts on the feature branch after queue ejection.
      Uses the clone working directory (context.work_dir) with the feature branch
      (context.merge_target) checked out. context.plan_path provides resolution guidance.
      escalation_required=true → release_issue_failure for human review.

  re_push_queue_fix:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: reenter_merge_queue
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"

  reenter_merge_queue:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash --auto"
      cwd: "${{ context.work_dir }}"
      step_name: "reenter_merge_queue"
    on_success: wait_for_queue
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Re-submits the PR after conflict resolution. Routes back to wait_for_queue.
      If re-entry fails, release_issue_failure preserves the clone for debugging.

  direct_merge:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash --auto"
      cwd: "${{ context.work_dir }}"
      step_name: "direct_merge"
    on_success: wait_for_direct_merge
    on_failure: confirm_cleanup
    skip_when_false: "inputs.open_pr"
    note: >
      Enables GitHub native auto-merge for direct merge (no merge queue). GitHub
      merges automatically once all required checks pass. On failure (PR already
      merged, not mergeable), degrades gracefully to confirm_cleanup.

  wait_for_direct_merge:
    tool: run_cmd
    with:
      cmd: >
        for i in $(seq 1 90); do
          STATE=$(gh pr view '${{ context.pr_number }}' --json state --jq '.state');
          if [ "$STATE" = "MERGED" ]; then echo "merged"; exit 0; fi;
          if [ "$STATE" = "CLOSED" ]; then echo "closed"; exit 0; fi;
          sleep 10;
        done; echo "timeout"
      cwd: "${{ context.work_dir }}"
      step_name: "wait_for_direct_merge"
    on_result:
      - when: "${{ result.stdout | trim }} == merged"
        route: release_issue_success
      - when: "${{ result.stdout | trim }} == closed"
        route: direct_merge_conflict_fix
      - route: release_issue_timeout
    on_failure: release_issue_timeout
    skip_when_false: "inputs.open_pr"
    note: >
      Polls GitHub PR state every 10 s for up to 15 minutes (90 iterations).
      merged → release_issue_success (issue labelled, cleanup runs).
      closed → PR was closed (likely conflict) — route to conflict fix.
      timeout / unexpected → release_issue_timeout.

  direct_merge_conflict_fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-merge-conflicts ${{ context.work_dir }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "direct_merge_conflict_fix"
    capture:
      conflict_escalation_required: "${{ result.escalation_required }}"
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: release_issue_failure
      - route: re_push_direct_fix
    on_failure: release_issue_failure
    on_context_limit: release_issue_failure
    retries: 1
    on_exhausted: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Resolves rebase conflicts on the feature branch after direct-merge rejection.
      escalation_required=true → release_issue_failure for human review.

  re_push_direct_fix:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: redirect_merge
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"

  redirect_merge:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash --auto"
      cwd: "${{ context.work_dir }}"
      step_name: "redirect_merge"
    on_success: wait_for_direct_merge
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Re-enables auto-merge after conflict resolution and re-push.
      Routes back to wait_for_direct_merge to poll for completion.
      On failure, release_issue_failure preserves the clone for debugging.

  immediate_merge:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash"
      cwd: "${{ context.work_dir }}"
      step_name: "immediate_merge"
    on_success: wait_for_immediate_merge
    on_failure: confirm_cleanup
    skip_when_false: "inputs.open_pr"
    note: >
      Merges the PR immediately using plain --squash when autoMergeAllowed=false.
      Unlike direct_merge, no --auto flag is used — GitHub executes the merge
      synchronously rather than queueing it for when checks pass. On failure
      (conflict or not-mergeable error from GitHub), degrades to confirm_cleanup.

  wait_for_immediate_merge:
    tool: run_cmd
    with:
      cmd: >
        for i in $(seq 1 30); do
          STATE=$(gh pr view '${{ context.pr_number }}' --json state --jq '.state');
          if [ "$STATE" = "MERGED" ]; then echo "merged"; exit 0; fi;
          if [ "$STATE" = "CLOSED" ]; then echo "closed"; exit 0; fi;
          sleep 10;
        done; echo "timeout"
      cwd: "${{ context.work_dir }}"
      step_name: "wait_for_immediate_merge"
    on_result:
      - when: "${{ result.stdout | trim }} == merged"
        route: release_issue_success
      - when: "${{ result.stdout | trim }} == closed"
        route: immediate_merge_conflict_fix
      - route: release_issue_timeout
    on_failure: release_issue_timeout
    skip_when_false: "inputs.open_pr"
    note: >
      Polls GitHub PR state every 10s for up to 5 minutes (30 iterations).
      Since immediate_merge uses --squash without --auto, the merge completes
      synchronously — this poll is a confirmation window.
      merged → release_issue_success.
      closed → PR was rejected (stale base or conflict) — route to conflict fix.
      timeout → release_issue_timeout.

  immediate_merge_conflict_fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-merge-conflicts ${{ context.work_dir }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "immediate_merge_conflict_fix"
    capture:
      conflict_escalation_required: "${{ result.escalation_required }}"
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: release_issue_failure
      - route: re_push_immediate_fix
    on_failure: release_issue_failure
    on_context_limit: release_issue_failure
    retries: 1
    on_exhausted: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Resolves rebase conflicts on the feature branch after immediate-merge rejection.
      Analogous to direct_merge_conflict_fix.
      escalation_required=true → release_issue_failure for human review.

  re_push_immediate_fix:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: remerge_immediate
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"

  remerge_immediate:
    tool: run_cmd
    with:
      cmd: "gh pr merge '${{ context.pr_number }}' --squash"
      cwd: "${{ context.work_dir }}"
      step_name: "remerge_immediate"
    on_success: wait_for_immediate_merge
    on_failure: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Re-attempts plain squash merge after conflict resolution and re-push.
      Routes back to wait_for_immediate_merge to confirm completion.
      On failure, release_issue_failure preserves the clone for debugging.

  diagnose_ci:
    tool: run_skill
    with:
      skill_command: "/autoskillit:diagnose-ci ${{ context.merge_target }} - - tests.yml"
      cwd: "${{ context.work_dir }}"
      step_name: "diagnose_ci"
      ci_failed_jobs: "${{ context.ci_failed_jobs }}"
    capture:
      diagnosis_path: "${{ result.diagnosis_path }}"
    on_success: resolve_ci
    on_failure: resolve_ci
    on_context_limit: resolve_ci
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Runs when ci_watch reports a CI failure. Fetches CI logs via gh API and writes
      a structured diagnosis to .autoskillit/temp/diagnose-ci/. Routes to resolve_ci on success
      OR failure (best-effort: resolve-failures proceeds even without a diagnosis).
      diagnosis_path is passed to resolve_ci for targeted remediation context.

  resolve_ci:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-failures ${{ context.work_dir }} ${{ context.plan_path }} ${{ inputs.base_branch }} ${{ context.ci_conclusion }} ${{ context.ci_failed_jobs }} ${{ context.diagnosis_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "resolve_ci"
    retries: 2
    on_exhausted: release_issue_failure
    on_success: re_push
    on_failure: release_issue_failure
    note: >
      Runs when ci_watch reports a CI failure. Receives ci_failed_jobs from wait_for_ci
      structured output to avoid redundant CI failure re-investigation. The clone
      (context.work_dir) has the feature branch (context.merge_target) checked out.
      The skill commits fixes and exits without merging; the orchestrator re-pushes
      via re_push. Retries up to 2 times (3 total attempts) before exhausting
      to cleanup_failure.

  re_push:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.merge_target }}"
    on_success: ci_watch
    on_failure: release_issue_failure
    note: >
      Pushes the CI-fixed feature branch back to the remote after resolve_ci succeeds.
      Routes back to ci_watch to verify the fix resolves CI. On push failure, escalates
      via cleanup_failure.

  detect_ci_conflict:
    tool: run_cmd
    with:
      cmd: "git fetch origin ${{ inputs.base_branch }} && ! git merge-base --is-ancestor origin/${{ inputs.base_branch }} HEAD"
      cwd: "${{ context.work_dir }}"
      step_name: "detect_ci_conflict"
    on_success: ci_conflict_fix
    on_failure: diagnose_ci
    optional: true
    skip_when_false: "inputs.open_pr"
    note: >
      Detects whether the CI failure originates from a stale integration base rather than
      a code-level test failure. Exit 0 (fetch succeeded AND base is NOT an ancestor of HEAD)
      signals a stale base — routes to ci_conflict_fix. Exit 1 (fetch failed OR base is already
      an ancestor) signals a real code failure or an unresolvable state — falls through to
      diagnose_ci. This step insulates resolve_ci from being invoked for merge-conflict failures.

  ci_conflict_fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-merge-conflicts ${{ context.work_dir }} ${{ context.plan_path }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "ci_conflict_fix"
    capture:
      conflict_escalation_required: "${{ result.escalation_required }}"
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: release_issue_failure
      - route: re_push
    on_failure: release_issue_failure
    on_context_limit: release_issue_failure
    retries: 1
    on_exhausted: release_issue_failure
    skip_when_false: "inputs.open_pr"
    note: >
      Resolves a stale-base CI failure by rebasing the feature branch onto the latest
      integration HEAD. Mirrors queue_ejected_fix: on clean rebase or goal-aware conflict
      resolution, routes to re_push to re-trigger CI on the rebased branch. On escalation
      (LOW confidence conflicts) or tool failure, routes to release_issue_failure.
      retries: 1 bounds the loop; after 2 total attempts, escalates.

  release_issue_success:
    description: "Transition issue from in-progress to staged after successful pipeline completion"
    tool: release_issue
    optional: true
    skip_when_false: inputs.issue_url
    with:
      issue_url: ${{ inputs.issue_url }}
      target_branch: ${{ inputs.base_branch }}
    on_success: confirm_cleanup
    on_failure: confirm_cleanup
    note: >
      Called on the success path after PR merge is confirmed.
      Passes target_branch so release_issue can determine whether to apply the
      staged label (non-default target) or just remove in-progress (default target).
      optional=true ensures pipeline still reaches confirm_cleanup if this step errors.

  release_issue_timeout:
    description: "Release in-progress claim after queue timeout without applying staged label"
    tool: release_issue
    optional: true
    skip_when_false: inputs.issue_url
    with:
      issue_url: ${{ inputs.issue_url }}
    on_success: confirm_cleanup
    on_failure: confirm_cleanup
    note: >
      Called when wait_for_merge_queue times out or errors. Releases the in-progress
      claim without passing target_branch, so the staged label is not applied. The
      merge is unconfirmed; a human must verify queue state independently.
      Routes to confirm_cleanup so the pipeline completes cleanly.

  release_issue_failure:
    description: "Release the in-progress claim after pipeline failure"
    tool: release_issue
    optional: true
    skip_when_false: inputs.issue_url
    with:
      issue_url: ${{ inputs.issue_url }}
    on_success: cleanup_failure
    on_failure: cleanup_failure

  confirm_cleanup:
    action: confirm
    message: >-
      Pipeline succeeded! The clone directory at ${{ context.work_dir }} has been preserved.
      Would you like to delete it now? Keeping it lets you resume any session that ran during
      this pipeline (implement-worktree, audit-impl, resolve-failures, etc.).
      Type yes to delete or no to keep.
    on_success: delete_clone
    on_failure: done
    note: >-
      User confirmation gate — preserves clone by default. On yes: delete_clone removes it.
      On no: done is reached immediately, clone stays on disk.

  delete_clone:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "false"
      step_name: delete_clone
    on_success: done
    on_failure: done
    note: >-
      Reached only after user explicitly confirms cleanup. Sync-check hook gates deletion —
      removal approved only when branch is pushed.

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Clone preservation step — keep=true means the clone is never
      auto-removed on failure. Remove manually: rm -rf {clone_path}.
      Always routes to escalate_stop.

  done:
    action: stop
    message: "Implementation pipeline complete. All tasks have been planned, implemented, tested, and merged."

  escalate_stop:
    action: stop
    message: "Pipeline failed — human intervention needed. Check the worktree and plan for details."
