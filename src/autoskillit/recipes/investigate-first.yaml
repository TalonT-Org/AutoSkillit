name: investigate-first
description: Investigate a problem deeply, plan architectural fix, implement and merge.
autoskillit_version: "0.2.0"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All code changes and investigation happen through
    headless sessions via run_skill/run_skill_retry."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    resolve-failures) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."
  - "SEQUENTIAL EXECUTION: complete full cycle per part before advancing.
    For each plan_part, run the full cycle (dry_walkthrough → implement →
    verify → merge) before starting the next part."
  - "SOURCE ISOLATION: After clone_repo returns, the source_dir is strictly
    off-limits. Never run any command in source_dir — no git checkout, git
    fetch, git reset, git pull, run_cmd, run_skill, or any other operation.
    All work — skill invocations, git operations, file reads — happens
    exclusively in the clone (work_dir). source_dir is used ONLY to read
    the remote URL inside push_to_remote."

ingredients:
  topic:
    description: Description of the bug, error, or question to investigate
    required: true
  source_dir:
    description: >
      Path to the source repository to clone and work in.
      Leave empty to auto-detect from git rev-parse --show-toplevel.
    required: false
    default: ""
  run_name:
    description: Name prefix for this pipeline run (used in clone directory name)
    default: "investigate"
  target_dir:
    description: Optional additional project directory for context
    default: ""
  base_branch:
    description: Branch to merge fixes into
    default: main
  audit:
    description: Run /autoskillit:audit-impl before merge to gate on implementation quality
    default: "true"
  review_approach:
    description: Run /autoskillit:review-approach before dry walkthrough? (true/false)
    default: "false"

steps:
  clone:
    tool: clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
      branch: "${{ inputs.base_branch }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      source_dir: "${{ result.source_dir }}"
    on_success: investigate
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir context used by all subsequent steps as cwd.
      On failure, escalate_stop is reached immediately (no clone to remove).

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate ${{ inputs.topic }}"
      cwd: "${{ context.work_dir }}"
      step_name: "investigate"
    on_success: rectify
    on_failure: cleanup_failure

  rectify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify"
      cwd: "${{ context.work_dir }}"
      step_name: "rectify"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: review
    on_failure: cleanup_failure
    note: >
      Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically into plan_parts[].

  review:
    tool: run_skill
    with:
      skill_command: "/autoskillit:review-approach ${{ context.plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "review"
    capture:
      review_path: "${{ result.review_path }}"
    on_success: dry_walkthrough
    on_failure: cleanup_failure
    note: "Only execute this step if review_approach input is 'true'. Otherwise skip directly to dry_walkthrough."

  dry_walkthrough:
    tool: run_skill
    with:
      skill_command: "/autoskillit:dry-walkthrough the plan"
      cwd: "${{ context.work_dir }}"
      add_dir: "${{ context.review_path }}"
      step_name: "dry_walkthrough"
    on_success: implement
    on_failure: rectify
    note: If walkthrough finds issues, re-plan via rectify.

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge the verified plan"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      implementation_ref: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    retry:
      max_attempts: 0
      on: needs_retry
      on_exhausted: retry_worktree
    on_success: verify
    on_failure: cleanup_failure

  retry_worktree:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:retry-worktree the verified plan ${{ context.implementation_ref }}"
      cwd: "${{ context.implementation_ref }}"
      step_name: "retry_worktree"
    capture:
      implementation_ref: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure
    on_success: verify
    on_failure: cleanup_failure

  verify:
    tool: test_check
    with:
      worktree_path: "${{ context.implementation_ref }}"
    on_success: audit_impl
    on_failure: assess

  assess:
    tool: run_skill
    model: sonnet
    with:
      skill_command: "/autoskillit:resolve-failures fix test failures"
      cwd: "${{ context.implementation_ref }}"
      step_name: "assess"
    on_success: verify
    on_failure: cleanup_failure
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: cleanup_failure

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl ${{ context.plan_path }} ${{ context.branch_name }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit_impl"
    capture:
      verdict: "${{ result.verdict }}"
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      field: verdict
      routes:
        GO: merge
        NO GO: remediate
    on_failure: escalate_stop
    note: Only run if inputs.audit = true. If inputs.audit = false, skip directly to merge.

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: make_plan

  make_plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan the remediation plan ${{ context.remediation_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "make_plan"
    capture:
      plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
    on_success: review
    on_failure: cleanup_failure

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.implementation_ref }}"
      base_branch: "${{ inputs.base_branch }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_success: push
    on_failure: cleanup_failure

  push:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      source_dir: "${{ context.source_dir }}"
      branch: "${{ inputs.base_branch }}"
    on_success: cleanup_success
    on_failure: cleanup_failure
    note: >
      Pushes the merged base_branch directly from the clone to the upstream remote.
      Reads the remote URL from source_dir (read-only) and pushes from clone_path,
      preserving clone isolation — source_dir is never modified.
      On failure, cleanup_failure still removes the clone.

  cleanup_success:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: done
    on_failure: done
    note: >
      Clone preservation step — keep=true means the clone is never
      auto-removed. Remove manually when done: rm -rf {clone_path}.
      Routes to done regardless — this step is intentionally a no-op.

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "true"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Clone preservation step — keep=true means the clone is never
      auto-removed on failure. Remove manually: rm -rf {clone_path}.
      Always routes to escalate_stop.

  done:
    action: stop
    message: "Investigation complete. Fix implemented and merged."

  escalate_stop:
    action: stop
    message: "Human intervention needed. Review the latest output for details."
