name: method_comparison_benchmarking
schema_version: "1.0"
priority: 12
display_name: "Method Comparison and Benchmarking"
canonical_guideline:
  name: "Weber et al. 2019"
  governing_body: "community"
  stable_for_decade: true
  canonical: false
fields_spanned:
  - computer_science
  - software_engineering
  - machine_learning
  - bioinformatics
  - operations_research
detection_keywords:
  - benchmark
  - method comparison
  - baseline comparison
  - state-of-the-art
  - SOTA
  - leaderboard
  - ablation study
  - performance comparison
  - evaluation protocol
mandatory_figures:
  - figure: "Performance Comparison Table or Figure"
    shows: "Quantitative metrics comparing all methods side-by-side"
    citation: "Weber et al. 2019 Section 4"
  - figure: "Statistical Significance Test Results"
    shows: "Tests comparing method performance with p-values or confidence intervals"
    citation: "Weber et al. 2019 Section 4"
strongly_expected_figures:
  - figure: "Critical Difference Diagram"
    shows: "Post-hoc pairwise comparisons with statistical significance"
    source: "Demšar 2006"
  - figure: "Runtime-Accuracy Pareto Front"
    shows: "Trade-off between computational cost and accuracy metrics"
    source: "Weber et al. 2019"
anti_patterns:
  - pattern: "No statistical significance testing"
    reason: "Performance differences must be tested for statistical significance"
  - pattern: "Cherry-picked baselines"
    reason: "All relevant competing methods should be included; omission of strong baselines biases conclusions"
  - pattern: "Unreported hyperparameter tuning"
    reason: "Methods must be fairly tuned before comparison to ensure valid assessment"
  - pattern: "No ablation study"
    reason: "Ablation studies isolate the contribution of individual components"
venue_specific_appendices:
  - sub_area: supervised_classification
    trigger_keywords:
      - confusion matrix
      - precision
      - recall
      - ROC-AUC
      - PR curve
      - classification
      - learning curve
    expectations:
      - figure: "Confusion Matrix"
        source: "NeurIPS/ICML community norms"
      - figure: "PR Curve"
        source: "NeurIPS/ICML community norms"
      - figure: "ROC-AUC Plot"
        source: "NeurIPS/ICML community norms"
      - figure: "Learning Curves"
        source: "NeurIPS/ICML community norms"
  - sub_area: nlp
    trigger_keywords:
      - accuracy
      - F1
      - GLUE
      - SuperGLUE
      - NLP
      - language model
      - token
    expectations:
      - figure: "Per-Task Accuracy Table"
        source: "ACL norms"
      - figure: "Error Analysis Examples"
        source: "ACL norms"
  - sub_area: computer_vision
    trigger_keywords:
      - mAP
      - COCO
      - detection
      - segmentation
      - object detection
      - image classification
    expectations:
      - figure: "Sample Predictions Grid"
        source: "CVPR/ECCV norms"
      - figure: "Failure Gallery"
        source: "CVPR/ECCV norms"
      - figure: "Per-Class mAP Table"
        source: "CVPR/ECCV norms"
  - sub_area: reinforcement_learning
    trigger_keywords:
      - episode reward
      - RL
      - Atari
      - agent
      - policy gradient
    expectations:
      - figure: "Episode Reward Curve"
        source: "NeurIPS RL norms"
