name: planner
autoskillit_version: "0.9.259"
recipe_version: "2"
description: |
  Progressive decomposition pipeline with parallel fan-out. Analyzes a codebase,
  generates phases, then elaborates each tier (phases, assignments, work packages)
  in parallel — one run_skill per phase simultaneously. Each tier follows the
  pattern: parallel elaborate → merge → refine. Reconciles dependencies, validates
  the dependency graph, and compiles a manifest ready for issue creation.
summary: "init > analyze > [domain?] > gen-phases > parallel-phases > parallel-assignments > parallel-wps > reconcile > validate/refine > compile"

requires_packs: [kitchen-core]
categories: [orchestration-family]

kitchen_rules:
  - Never invoke native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash, Agent,
    WebFetch, WebSearch, NotebookEdit) from the orchestrator. All codebase interaction
    runs inside headless skill sessions.
  - Route to on_failure or escalate_stop rather than attempting inline recovery.
  - The refine/validate cycle is bounded by retries. If refine is exhausted, halt.
  - "PARALLEL DISPATCH: When a step note says 'PARALLEL DISPATCH', iterate the
    comma-separated list in the referenced context variable. For each item, substitute
    it into the skill_command template placeholder and issue one run_skill call. Issue
    ALL calls in a single assistant message so they execute concurrently. Accumulate
    each result via capture_list."

ingredients:
  task:
    description: "High-level task or feature description to decompose into a plan."
    required: true
  source_dir:
    description: "Absolute path to the repository root to analyze."
    required: true

steps:

  init:
    tool: run_python
    with:
      callable: "autoskillit.planner.create_run_dir"
      args:
        temp_dir: "{{AUTOSKILLIT_TEMP}}"
    capture:
      planner_dir: "${{ result.planner_dir }}"
    on_success: analyze
    on_failure: escalate_stop

  analyze:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-analyze ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    on_success: extract_domain
    on_failure: escalate_stop

  extract_domain:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-extract-domain"
      cwd: "${{ inputs.source_dir }}"
      env:
        PLANNER_ANALYSIS_FILE: "${{ context.planner_dir }}/analysis.json"
    on_success: generate_phases
    on_failure: generate_phases

  generate_phases:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-generate-phases
        ${{ context.planner_dir }}/analysis.json
        ${{ context.planner_dir }}/domain_knowledge.md
      cwd: "${{ inputs.source_dir }}"
    capture:
      phase_manifest_path: "${{ result.phase_manifest_path }}"
    on_success: build_plan_snapshot
    on_failure: escalate_stop

  # --- PHASE TIER ---

  build_plan_snapshot:
    tool: run_python
    with:
      callable: "autoskillit.planner.merge.build_plan_snapshot"
      phases_dir: "${{ context.planner_dir }}/phases"
      phase_manifest_path: "${{ context.phase_manifest_path }}"
      output_path: "${{ context.planner_dir }}/plan_snapshot.json"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    capture:
      plan_snapshot_path: "${{ result.snapshot_path }}"
      phase_ids: "${{ result.phase_ids }}"
    on_success: elaborate_phases
    on_failure: escalate_stop

  elaborate_phases:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-phase ${{ context.plan_snapshot_path }} {phase_id} ${{ context.planner_dir }}/phases"
      cwd: "${{ inputs.source_dir }}"
      dispatch_items: "${{ context.phase_ids }}"
    capture_list:
      elab_result_path: "${{ result.elab_result_path }}"
    on_success: merge_phases
    on_failure: escalate_stop
    note: >
      PARALLEL DISPATCH: context.phase_ids contains comma-separated phase IDs
      (e.g. "P1,P2,P3"). For each phase_id, substitute it into the {phase_id}
      placeholder in skill_command and issue one run_skill call. Run ALL
      elaborations in parallel (all run_skill calls in a single message).
      Accumulate each elab_result_path value via capture_list.

  merge_phases:
    tool: run_python
    with:
      callable: "autoskillit.planner.merge.merge_tier_dir"
      results_dir: "${{ context.planner_dir }}/phases"
      output_path: "${{ context.planner_dir }}/combined_plan.json"
      key: "phases"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    capture:
      combined_phases_path: "${{ result.merged_path }}"
    on_success: refine_phases
    on_failure: escalate_stop

  refine_phases:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-refine-phases ${{ context.combined_phases_path }} ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    capture:
      refined_plan_path: "${{ result.refined_plan_path }}"
    on_success: expand_assignments
    on_failure: escalate_stop

  # --- ASSIGNMENT TIER ---

  expand_assignments:
    tool: run_python
    with:
      callable: "autoskillit.planner.expand_assignments"
      refined_plan_path: "${{ context.refined_plan_path }}"
      output_dir: "${{ context.planner_dir }}"
    capture:
      assignment_context_paths: "${{ result.context_paths }}"
    on_success: elaborate_assignments
    on_failure: escalate_stop

  elaborate_assignments:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-assignments {context_path} ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
      dispatch_items: "${{ context.assignment_context_paths }}"
    capture_list:
      phase_assignments_result_dir: "${{ result.phase_assignments_result_dir }}"
    on_success: merge_assignments
    on_failure: escalate_stop
    note: >
      PARALLEL DISPATCH: context.assignment_context_paths contains comma-separated
      paths to per-phase context files. For each context_path, substitute it into
      the {context_path} placeholder in skill_command and issue one run_skill call.
      Run ALL elaborations in parallel. Accumulate results via capture_list.

  merge_assignments:
    tool: run_python
    with:
      callable: "autoskillit.planner.merge.merge_tier_dir"
      results_dir: "${{ context.planner_dir }}/assignments"
      output_path: "${{ context.planner_dir }}/combined_assignments.json"
      key: "assignments"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    capture:
      combined_assignments_path: "${{ result.merged_path }}"
    on_success: refine_assignments
    on_failure: escalate_stop

  refine_assignments:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-refine-assignments
        ${{ context.combined_assignments_path }}
        ${{ context.refined_plan_path }}
        ${{ context.planner_dir }}
      cwd: "${{ inputs.source_dir }}"
    capture:
      refined_assignments_path: "${{ result.refined_assignments_path }}"
    on_success: expand_wps
    on_failure: escalate_stop

  # --- WORK PACKAGE TIER ---

  expand_wps:
    tool: run_python
    with:
      callable: "autoskillit.planner.expand_wps"
      refined_assignments_path: "${{ context.refined_assignments_path }}"
      output_dir: "${{ context.planner_dir }}"
    capture:
      wp_context_paths: "${{ result.context_paths }}"
    on_success: elaborate_wps
    on_failure: escalate_stop

  elaborate_wps:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-wps {context_path} ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
      dispatch_items: "${{ context.wp_context_paths }}"
    capture_list:
      phase_wps_result_dir: "${{ result.phase_wps_result_dir }}"
    on_success: finalize_wp_manifest
    on_failure: escalate_stop
    note: >
      PARALLEL DISPATCH: context.wp_context_paths contains comma-separated paths
      to per-phase WP context files. For each context_path, substitute it into
      the {context_path} placeholder in skill_command and issue one run_skill call.
      Run ALL elaborations in parallel. Accumulate results via capture_list.

  finalize_wp_manifest:
    tool: run_python
    with:
      callable: "autoskillit.planner.finalize_wp_manifest"
      work_packages_dir: "${{ context.planner_dir }}/work_packages"
      output_dir: "${{ context.planner_dir }}"
    on_success: merge_wps
    on_failure: escalate_stop

  merge_wps:
    tool: run_python
    with:
      callable: "autoskillit.planner.merge.merge_tier_dir"
      results_dir: "${{ context.planner_dir }}/work_packages"
      output_path: "${{ context.planner_dir }}/combined_wps.json"
      key: "work_packages"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    capture:
      combined_wps_path: "${{ result.merged_path }}"
    on_success: refine_wps
    on_failure: escalate_stop

  refine_wps:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-refine-wps
        ${{ context.combined_wps_path }}
        ${{ context.refined_plan_path }}
        ${{ context.refined_assignments_path }}
        ${{ context.planner_dir }}
      cwd: "${{ inputs.source_dir }}"
    capture:
      refined_wps_path: "${{ result.refined_wps_path }}"
    on_success: reconcile_deps
    on_failure: escalate_stop

  # --- FINALIZATION ---

  reconcile_deps:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-reconcile-deps ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
      refined_wps_path: "${{ context.refined_wps_path }}"
    on_success: validate
    on_failure: escalate_stop

  validate:
    tool: run_python
    with:
      callable: "autoskillit.planner.validate_plan"
      output_dir: "${{ context.planner_dir }}"
    capture:
      verdict: "${{ result.verdict }}"
    on_success: check_verdict
    on_failure: escalate_stop

  check_verdict:
    action: route
    on_result:
      - when: "${{ context.verdict }} == fail"
        route: refine
      - route: compile

  refine:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-refine
        ${{ context.planner_dir }}/validation.json
        ${{ context.planner_dir }}
      cwd: "${{ inputs.source_dir }}"
    retries: 2
    on_success: validate
    on_exhausted: escalate_stop
    on_failure: escalate_stop

  compile:
    tool: run_python
    with:
      callable: "autoskillit.planner.compile_plan"
      output_dir: "${{ context.planner_dir }}"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    on_success: done
    on_failure: escalate_stop

  done:
    action: stop
    message: >
      Planning complete. Plan artifacts written to ${{ context.planner_dir }}/.
      Use compile output to create GitHub issues and milestones.

  escalate_stop:
    action: stop
    message: "Planner pipeline failed — human intervention needed. Review the latest step output for details."
