name: planner
autoskillit_version: "0.9.203"
recipe_version: "1"
description: |
  Progressive decomposition pipeline. Analyzes a codebase, generates phases, elaborates
  assignments and work packages in iterative loops, reconciles dependencies, validates the
  dependency graph, and compiles a manifest ready for issue creation.
summary: "init > analyze > [extract_domain?] > phases-loop > assignments-loop > wps-loop > reconcile > validate/refine > compile"

requires_packs: [kitchen-core]
categories: [orchestration-family]

kitchen_rules:
  - Never invoke native Claude Code tools (Read, Grep, Glob, Edit, Write, Bash, Agent,
    WebFetch, WebSearch, NotebookEdit) from the orchestrator. All codebase interaction
    runs inside headless skill sessions.
  - Route to on_failure or escalate_stop rather than attempting inline recovery.
  - Each check_* step controls loop iteration. Do not call elaborate_* steps directly;
    always go through the corresponding check_* step first.
  - The refine/validate cycle is bounded by retries. If refine is exhausted, halt.

ingredients:
  task:
    description: "High-level task or feature description to decompose into a plan."
    required: true
  source_dir:
    description: "Absolute path to the repository root to analyze."
    required: true

steps:

  init:
    tool: run_python
    with:
      step_name: "init"
      callable: "autoskillit.planner.create_run_dir"
    capture:
      planner_dir: "${{ result.planner_dir }}"
    on_success: analyze
    on_failure: escalate_stop

  analyze:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-analyze ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    on_success: extract_domain
    on_failure: escalate_stop

  extract_domain:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-extract-domain"
      cwd: "${{ inputs.source_dir }}"
      env:
        PLANNER_ANALYSIS_FILE: "${{ context.planner_dir }}/analysis.json"
    on_success: generate_phases
    on_failure: generate_phases

  generate_phases:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-generate-phases
        ${{ context.planner_dir }}/analysis.json
        ${{ context.planner_dir }}/domain_knowledge.md
      cwd: "${{ inputs.source_dir }}"
    capture:
      phase_manifest_path: "${{ result.phase_manifest_path }}"
    on_success: build_pre_elab_snapshot
    on_failure: escalate_stop

  build_pre_elab_snapshot:
    tool: run_python
    with:
      callable: "autoskillit.planner.build_pre_elab_snapshot"
      manifest_path: "${{ context.phase_manifest_path }}"
      output_dir: "${{ context.planner_dir }}"
    capture:
      pre_elab_snapshot_path: "${{ result.snapshot_path }}"
    on_success: check_phases
    on_failure: escalate_stop

  check_phases:
    tool: run_python
    with:
      callable: "autoskillit.planner.check_remaining"
      manifest_path: "${{ context.phase_manifest_path }}"
      pass_name: "phases"
      output_dir: "${{ context.planner_dir }}"
    capture:
      has_remaining: "${{ result.has_remaining }}"
      current_item_path: "${{ result.current_item_path }}"
      current_item_id: "${{ result.current_item_id }}"
    on_result:
      - when: "${{ result.has_remaining }} == true"
        route: elaborate_phase
      - route: build_phase_assignment_manifest
    on_failure: escalate_stop

  elaborate_phase:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-phase ${{ context.pre_elab_snapshot_path }} ${{ context.current_item_id }} ${{ context.planner_dir }}/phases"
      cwd: "${{ inputs.source_dir }}"
    optional_context_refs: [current_item_id]
    capture_list:
      elab_result_path: "${{ result.elab_result_path }}"
    retries: 1
    on_success: check_phases
    on_exhausted: escalate_stop
    on_failure: escalate_stop

  build_phase_assignment_manifest:
    tool: run_python
    with:
      callable: "autoskillit.planner.build_phase_assignment_manifest"
      phases_dir: "${{ context.planner_dir }}/phases"
      output_dir: "${{ context.planner_dir }}/assignments"
    capture:
      phase_assignment_manifest: "${{ result.manifest_path }}"
    on_success: check_phase_assignments
    on_failure: escalate_stop

  check_phase_assignments:
    tool: run_python
    with:
      callable: "autoskillit.planner.check_remaining"
      manifest_path: "${{ context.phase_assignment_manifest }}"
      pass_name: "phase_assignments"
      output_dir: "${{ context.planner_dir }}/assignments"
    capture:
      has_remaining: "${{ result.has_remaining }}"
      current_item_path: "${{ result.current_item_path }}"
      current_item_id: "${{ result.current_item_id }}"
    on_result:
      - when: "${{ result.has_remaining }} == true"
        route: elaborate_phase_assignments
      - route: build_phase_wp_manifest
    on_failure: escalate_stop

  elaborate_phase_assignments:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-assignments ${{ context.current_item_path }} ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    optional_context_refs: [current_item_path]
    capture_list:
      phase_assignments_result_dir: "${{ result.phase_assignments_result_dir }}"
    retries: 1
    on_success: check_phase_assignments
    on_exhausted: escalate_stop
    on_failure: escalate_stop

  build_phase_wp_manifest:
    tool: run_python
    with:
      callable: "autoskillit.planner.build_phase_wp_manifest"
      assignments_dir: "${{ context.planner_dir }}/assignments"
      work_packages_dir: "${{ context.planner_dir }}/work_packages"
      output_dir: "${{ context.planner_dir }}"
    capture:
      phase_wp_manifest_path: "${{ result.manifest_path }}"
    on_success: check_phase_wps
    on_failure: escalate_stop

  check_phase_wps:
    tool: run_python
    with:
      callable: "autoskillit.planner.check_remaining"
      manifest_path: "${{ context.phase_wp_manifest_path }}"
      pass_name: "phase_work_packages"
      output_dir: "${{ context.planner_dir }}/work_packages"
    capture:
      has_remaining: "${{ result.has_remaining }}"
      current_item_path: "${{ result.current_item_path }}"
      current_item_id: "${{ result.current_item_id }}"
    on_result:
      - when: "${{ result.has_remaining }} == true"
        route: elaborate_phase_wps
      - route: finalize_wp_manifest
    on_failure: escalate_stop

  elaborate_phase_wps:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-elaborate-wps ${{ context.current_item_path }} ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    optional_context_refs: [current_item_path]
    capture_list:
      phase_wps_result_dir: "${{ result.phase_wps_result_dir }}"
    retries: 1
    on_success: check_phase_wps
    on_exhausted: check_phase_wps
    on_failure: escalate_stop

  finalize_wp_manifest:
    tool: run_python
    with:
      callable: "autoskillit.planner.finalize_wp_manifest"
      work_packages_dir: "${{ context.planner_dir }}/work_packages"
      output_dir: "${{ context.planner_dir }}"
    on_success: reconcile_deps
    on_failure: escalate_stop

  reconcile_deps:
    tool: run_skill
    with:
      skill_command: "/autoskillit:planner-reconcile-deps ${{ context.planner_dir }}"
      cwd: "${{ inputs.source_dir }}"
    on_success: validate
    on_failure: escalate_stop

  validate:
    tool: run_python
    with:
      callable: "autoskillit.planner.validate_plan"
      output_dir: "${{ context.planner_dir }}"
    capture:
      verdict: "${{ result.verdict }}"
    on_success: check_verdict
    on_failure: escalate_stop

  check_verdict:
    action: route
    on_result:
      - when: "${{ context.verdict }} == fail"
        route: refine
      - route: compile

  refine:
    tool: run_skill
    with:
      skill_command: >
        /autoskillit:planner-refine
        ${{ context.planner_dir }}/validation.json
        ${{ context.planner_dir }}
      cwd: "${{ inputs.source_dir }}"
    retries: 2
    on_success: validate
    on_exhausted: escalate_stop
    on_failure: escalate_stop

  compile:
    tool: run_python
    with:
      callable: "autoskillit.planner.compile_plan"
      output_dir: "${{ context.planner_dir }}"
      task: "${{ inputs.task }}"
      source_dir: "${{ inputs.source_dir }}"
    on_success: done
    on_failure: escalate_stop

  done:
    action: stop
    message: >
      Planning complete. Plan artifacts written to ${{ context.planner_dir }}/.
      Use compile output to create GitHub issues and milestones.

  escalate_stop:
    action: stop
    message: "Planner pipeline failed — human intervention needed. Review the latest step output for details."
