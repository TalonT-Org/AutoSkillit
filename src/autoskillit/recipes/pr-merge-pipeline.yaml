name: pr-merge-pipeline
description: Analyze open PRs, determine merge order, collapse them sequentially into an integration branch, and open a single review PR for human approval. Handles conflict resolution via plan+implement for complex PRs.
summary: "clone > setup_remote > analyze_prs > create_integration_branch > [loop per PR: merge_pr or (plan > verify > implement > test > merge_to_integration)] > push_integration_branch > collect_artifacts > check_impl_plans > (audit_impl?) > create_review_pr > cleanup"
autoskillit_version: "0.2.0"

ingredients:
  source_dir:
    description: Path to the source repository to clone and work in
    required: true
  run_name:
    description: Name prefix for this pipeline run (used in clone directory name)
    default: "pr-merge"
  keep_clone_on_failure:
    description: Keep the clone directory when the pipeline fails (true/false)
    default: "false"
  base_branch:
    description: Target branch that all PRs are merging into; integration branch is created from this. Pass 'integration' to use the persistent integration branch feature.
  upstream_branch:
    description: Branch to create base_branch from if it does not yet exist on the remote
    default: main
  audit:
    description: Run /autoskillit:audit-impl after all PRs are merged to check coherency (true/false)
    default: "true"
  plans_dir:
    description: Directory where collected plan files are stored for audit-impl
    default: "temp/pr-merge-pipeline"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Agent, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill
    and run_cmd."
  - "Route to on_failure when a step fails — do not investigate or fix directly."
  - "SEQUENTIAL LOOP: Process one PR at a time through the full merge cycle before
    advancing to the next PR. Never batch-assess all PRs before starting merges."
  - "SEQUENTIAL EXECUTION: complete full cycle (verify → implement → test →
    merge_to_integration) per plan part before advancing to the next part or PR."
  - "INTEGRATION BRANCH: Two distinct branches exist. inputs.base_branch is the
    PERMANENT branch (default: integration) that accumulates AI work across runs —
    it is never deleted. context.integration_branch is the PER-RUN batch branch
    (e.g. pr-batch/pr-merge-{ts}) created from base_branch for this pipeline run.
    All PR merges and worktree merges target context.integration_branch. The final
    review PR opens from context.integration_branch into inputs.base_branch."
  - "PR QUEUE: The agent reads context.pr_order_file once at analyze_prs and
    maintains an ordered queue. context.current_pr_index (agent-maintained, starts
    at 0) tracks progress. Advance the index after each successful merge or
    complex-pr cycle completes."
  - "COMPLEX PR PATH: When merge_pr returns needs_plan=true, context.task is set to
    the conflict_report_path. Pass context.task to make-plan. The plan+implement
    cycle creates a worktree from the integration branch and merges it back via
    merge_to_integration."
  - "SOURCE ISOLATION: After clone_repo returns, the source_dir is strictly
    off-limits. Never run any command in source_dir — no git checkout, git
    fetch, git reset, git pull, run_cmd, run_skill, or any other operation.
    All work — skill invocations, git operations, file reads — happens
    exclusively in the clone (work_dir). source_dir is used ONLY to read
    the remote URL inside push_to_remote."

steps:
  clone:
    python: autoskillit.workspace.clone.clone_repo
    with:
      source_dir: "${{ inputs.source_dir }}"
      run_name: "${{ inputs.run_name }}"
    capture:
      work_dir: "${{ result.clone_path }}"
      remote_url: "${{ result.remote_url }}"
    on_success: setup_remote
    on_failure: escalate_stop
    note: >
      Clones source_dir into ../autoskillit-runs/<run_name>-<timestamp>/.
      Captures work_dir used as cwd by all subsequent steps.
      On failure, escalate_stop is reached immediately — no clone to remove.

  setup_remote:
    tool: run_cmd
    with:
      cmd: "git remote set-url origin \"$(git -C ${{ inputs.source_dir }} remote get-url origin)\""
      cwd: "${{ context.work_dir }}"
    on_success: check_integration_exists
    on_failure: cleanup_failure
    note: >
      The clone's origin initially points to the local source_dir path.
      This step replaces it with the actual GitHub remote URL from source_dir,
      so that gh CLI commands and git fetch origin work correctly in the clone.

  check_integration_exists:
    tool: run_cmd
    with:
      cmd: "git ls-remote --exit-code --heads origin \"${{ inputs.base_branch }}\""
      cwd: "${{ context.work_dir }}"
    on_success: analyze_prs
    on_failure: confirm_create_integration
    note: >
      Checks whether the permanent base_branch (default: integration) exists on
      the remote. Exit code 0 means the branch exists — proceed to analyze_prs.
      Non-zero exit means the branch is absent — route to user confirmation before
      creating it. This is an idempotent check: re-running the pipeline after
      the branch is created will simply skip through on_success.

  confirm_create_integration:
    action: confirm
    message: >-
      The branch '${{ inputs.base_branch }}' does not exist on the remote.
      Create it now from '${{ inputs.upstream_branch }}'?
      This will be a permanent branch that accumulates AI-generated work.
      Type yes to create it or no to abort.
    on_success: create_persistent_integration
    on_failure: escalate_stop
    note: >
      User approval gate. On yes: create_persistent_integration creates and
      pushes the permanent branch. On no: escalate_stop — the pipeline cannot
      proceed without the target branch.

  create_persistent_integration:
    tool: run_cmd
    with:
      cmd: "git checkout '${{ inputs.upstream_branch }}' && git pull && git checkout -b '${{ inputs.base_branch }}' && git push origin '${{ inputs.base_branch }}'"
      cwd: "${{ context.work_dir }}"
    on_success: analyze_prs
    on_failure: cleanup_failure
    note: >
      Creates the permanent base_branch (e.g. integration) off upstream_branch
      (e.g. main) and pushes it to the remote. This step only executes when the
      user confirmed branch creation in confirm_create_integration. Once created,
      subsequent pipeline runs skip directly from check_integration_exists to
      analyze_prs via on_success.

  analyze_prs:
    tool: run_skill
    with:
      skill_command: "/autoskillit:analyze-prs ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "analyze_prs"
    capture:
      pr_order_file: "${{ result.pr_order_file }}"
      integration_branch: "${{ result.integration_branch }}"
    on_success: create_integration_branch
    on_failure: cleanup_failure
    note: >
      Captures pr_order_file (path to JSON with ordered PRs + complexity tags) and
      integration_branch (e.g. integration/pr-merge-20250228-143052). If the skill
      reports pr_count=0 (no open PRs), skip directly to cleanup_success — no
      integration branch is needed.

  create_integration_branch:
    tool: run_cmd
    with:
      cmd: "git checkout ${{ inputs.base_branch }} && git pull && git checkout -b ${{ context.integration_branch }}"
      cwd: "${{ context.work_dir }}"
    on_success: publish_integration_branch
    on_failure: cleanup_failure
    note: >
      Creates the integration branch from the latest base_branch HEAD.
      context.integration_branch was computed by analyze_prs.
      The agent initializes context.current_pr_index = 0 here.

  publish_integration_branch:
    tool: push_to_remote
    with:
      clone_path: "${{ context.work_dir }}"
      remote_url: "${{ context.remote_url }}"
      branch: "${{ context.integration_branch }}"
    on_success: merge_pr
    on_failure: cleanup_failure
    note: >
      Publishes the integration branch to origin immediately after creation so
      that merge_worktree can verify refs/remotes/origin/integration_branch exists
      before rebasing. The branch is re-pushed at push_integration_branch after all
      merges complete to update the remote with accumulated merge commits.

  merge_pr:
    tool: run_skill
    with:
      skill_command: "/autoskillit:merge-pr {pr_number} {complexity}"
      cwd: "${{ context.work_dir }}"
      step_name: "merge_pr"
      pr_order_file: "${{ context.pr_order_file }}"
    capture:
      needs_plan: "${{ result.needs_plan }}"
      escalation_required: "${{ result.escalation_required }}"
      escalation_reason: "${{ result.escalation_reason }}"
      task: "${{ result.conflict_report_path }}"
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: escalate_stop
      - when: "${{ result.needs_plan }} == true"
        route: plan
      - route: next_part_or_next_pr
    on_failure: cleanup_failure
    retries: 5
    on_exhausted: cleanup_failure
    on_context_limit: cleanup_failure
    note: >
      The agent reads context.pr_order_file at context.current_pr_index to get the
      current PR's number and complexity. Appends them to skill_command:
        /autoskillit:merge-pr {pr_number} {complexity}
      escalation_required=true → ambiguous conflict, human intervention needed → escalate_stop.
      needs_plan=true → conflict_report_path set as context.task → plan.
      needs_plan=false (fallthrough) → PR merged directly → next_part_or_next_pr.

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:make-plan ${{ context.task }}"
      cwd: "${{ context.work_dir }}"
      step_name: "plan"
    capture:
      pr_plan_path: "${{ result.plan_path }}"
    capture_list:
      plan_parts: "${{ result.plan_parts }}"
      all_plan_paths: "${{ result.plan_path }}"
    on_success: verify
    on_failure: cleanup_failure
    note: >
      Glob plan_dir for *_part_*.md or single plan file. Sort alphabetically
      into plan_parts[]. For a single-part plan, plan_parts has one entry equal
      to plan_path.
      PRIMARY PATH: context.task = conflict_report_path from merge_pr.
      REMEDIATION MODE: context.remediation_path is set when re-entering from
      the remediate step; pass it inline in the skill_command instead of
      context.task.

  verify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:dry-walkthrough ${{ context.pr_plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "verify"
    on_success: implement
    on_failure: cleanup_failure
    retries: 5
    on_exhausted: cleanup_failure
    on_context_limit: cleanup_failure
    note: >
      SEQUENTIAL: For each plan_part, run the full cycle
      (verify → implement → test → merge_to_integration) before advancing.

  implement:
    tool: run_skill
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge ${{ context.pr_plan_path }}"
      cwd: "${{ context.work_dir }}"
      step_name: "implement"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    on_success: test
    on_failure: cleanup_failure
    retries: 0
    on_exhausted: retry_worktree
    on_context_limit: retry_worktree

  retry_worktree:
    tool: run_skill
    with:
      skill_command: "/autoskillit:retry-worktree ${{ context.pr_plan_path }} ${{ context.worktree_path }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "retry_worktree"
    capture:
      worktree_path: "${{ result.worktree_path }}"
    on_success: test
    on_failure: cleanup_failure
    retries: 3
    on_exhausted: cleanup_failure
    on_context_limit: cleanup_failure

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge_to_integration
    on_failure: fix

  merge_to_integration:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ context.integration_branch }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_failure: cleanup_failure
    on_result:
      - when: "result.failed_step == 'dirty_tree'"
        route: fix
      - when: "${{ result.state }} == worktree_intact_rebase_aborted"
        route: resolve_merge_conflicts
      - when: "result.failed_step == 'rebase'"
        route: cleanup_failure
      - when: "result.failed_step == 'test_gate'"
        route: cleanup_failure
      - when: "result.failed_step == 'post_rebase_test_gate'"
        route: cleanup_failure
      - route: next_part_or_next_pr
    note: >
      Merges the conflict-resolution worktree into the integration branch
      (not inputs.base_branch). After merge, check if more plan_parts remain
      for this PR. If so, return to verify with the next part. If all parts
      are done, go to next_part_or_next_pr.
      On rebase failure with worktree intact, routes to resolve_merge_conflicts
      for goal-aware resolution. On dirty-worktree rebase failure or test gate
      failures, follow on_failure: cleanup_failure.
      NEVER use run_cmd as a workaround. A state of
      worktree_intact_merge_commits_detected means the conflict-resolution plan
      used git merge --no-ff; clean up the worktree and regenerate the plan
      using cherry-pick or git checkout -- file approaches.

  resolve_merge_conflicts:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-merge-conflicts ${{ context.worktree_path }} ${{ context.pr_plan_path }} ${{ context.integration_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "resolve_merge_conflicts"
    capture:
      worktree_path: "${{ result.worktree_path }}"
      branch_name: "${{ result.branch_name }}"
      escalation_required: "${{ result.escalation_required }}"
      escalation_reason: "${{ result.escalation_reason }}"
    on_failure: cleanup_failure
    on_result:
      - when: "${{ result.escalation_required }} == true"
        route: cleanup_failure
      - route: retry_merge_after_resolution
    note: >
      Invoked when merge_worktree fails with a rebase conflict and the worktree
      is still intact (worktree_intact_rebase_aborted). The skill reads the
      implementation plan and git history to understand the goals of both sides,
      resolves conflicts in-place when confidence is HIGH or MEDIUM, and
      escalates (cleanup_failure) when confidence is LOW. On success, routes
      to retry_merge_after_resolution to re-attempt the merge without loop-back
      routing.

  commit_dirty:
    tool: run_cmd
    with:
      cmd: "git add -A && git commit -m 'chore: commit auto-generated files'"
      cwd: "${{ context.worktree_path }}"
    on_success: retry_merge_after_resolution
    on_failure: cleanup_failure

  retry_merge_after_resolution:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ context.integration_branch }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_result:
      - when: "result.failed_step == 'dirty_tree'"
        route: commit_dirty
      - when: "result.failed_step == 'test_gate'"
        route: cleanup_failure
      - when: "result.failed_step == 'post_rebase_test_gate'"
        route: cleanup_failure
      - when: "result.failed_step == 'rebase'"
        route: cleanup_failure
      - when: "result.error"
        route: cleanup_failure
      - route: next_part_or_next_pr
    on_failure: cleanup_failure
    note: >
      Re-attempts merge_worktree after resolve_merge_conflicts has rebased the
      worktree onto the integration branch. Has no on_result routing back to
      resolve_merge_conflicts — if this fails, the pipeline escalates without
      further automated recovery to prevent infinite loops.

  fix:
    tool: run_skill
    with:
      skill_command: "/autoskillit:resolve-failures ${{ context.worktree_path }} ${{ context.pr_plan_path }} ${{ context.integration_branch }}"
      cwd: "${{ context.worktree_path }}"
      step_name: "fix"
      base_branch: "${{ inputs.base_branch }}"
    on_success: test
    on_failure: cleanup_failure
    retries: 3
    on_exhausted: cleanup_failure
    on_context_limit: cleanup_failure
    note: >
      Fixes test failures without merging. Routes back to test for
      re-validation before merge_to_integration. The base_branch with: key is
      present for contract compatibility only; the merge target is always the
      integration branch.

  next_part_or_next_pr:
    action: route
    on_result:
      field: next
      routes:
        more_parts: verify
        more_prs: merge_pr
        all_done: push_integration_branch
    note: >
      Routing step — no tool call. The agent evaluates what comes next:
      1. If more plan_parts remain for the current PR → verify (next part).
      2. If all parts done, advance current_pr_index. If more PRs remain → merge_pr.
      3. If all PRs processed → push_integration_branch.

  push_integration_branch:
    tool: run_cmd
    with:
      cmd: "git push --set-upstream origin ${{ context.integration_branch }}"
      cwd: "${{ context.work_dir }}"
    on_success: collect_artifacts
    on_failure: cleanup_failure
    note: >
      Pushes the updated integration branch to origin after all PR merges complete,
      so the remote reflects the full merged state before opening the review PR.

  collect_artifacts:
    tool: run_cmd
    with:
      cmd: "mkdir -p ${{ inputs.plans_dir }} && find temp/make-plan/ -name '*_plan_*.md' -exec cp {} ${{ inputs.plans_dir }}/ \\; 2>/dev/null || true"
      cwd: "${{ context.work_dir }}"
    on_success: check_impl_plans
    on_failure: check_impl_plans
    note: >
      Copies plan files generated during the pipeline (from temp/make-plan/) into
      temp/pr-merge-pipeline/ alongside any conflict reports already there.
      Always routes to check_impl_plans, which determines whether audit_impl
      is meaningful.

  check_impl_plans:
    tool: run_cmd
    with:
      cmd: "find ${{ inputs.plans_dir }} -maxdepth 1 -name '*_plan_*.md' ! -name 'pr_analysis_plan_*.md' 2>/dev/null | wc -l | tr -d ' \n'"
      cwd: "${{ context.work_dir }}"
    on_result:
      - when: "${{ result.stdout | trim }} == 0"
        route: create_review_pr
      - route: audit_impl
    on_failure: audit_impl
    note: >
      Counts implementation plan files in plans_dir — excludes pr_analysis_plan_*.md,
      which is always written by analyze-prs but is not an implementation plan.
      Routes to create_review_pr when zero implementation plans exist (all PRs merged
      cleanly, make-plan was never invoked — "No plans generated; all PRs merged cleanly").
      Routes to audit_impl when conflict reports or make-plan outputs are present.

  audit_impl:
    tool: run_skill
    with:
      skill_command: "/autoskillit:audit-impl \"${{ context.all_plan_paths }}\" ${{ context.integration_branch }} ${{ inputs.base_branch }}"
      cwd: "${{ context.work_dir }}"
      step_name: "audit_impl"
    capture:
      verdict: "${{ result.verdict }}"
      remediation_path: "${{ result.remediation_path }}"
    on_result:
      field: verdict
      routes:
        GO: create_review_pr
        NO GO: remediate
    on_failure: cleanup_failure
    optional: true
    skip_when_false: "inputs.audit"
    note: >
      DEPENDENCY: context.all_plan_paths is only populated if the plan step executed
      at least once. The check_impl_plans gate ensures this step is only reached when
      implementation plan files exist (i.e. make-plan was invoked), so all_plan_paths
      is guaranteed to be set when audit_impl runs.
      Gated by check_impl_plans — only reached when implementation plan files exist in
      plans_dir. Only execute if inputs.audit is 'true'; if false, skip directly to
      create_review_pr. Passes context.all_plan_paths (comma-separated list of plan file
      paths accumulated across the PR loop) as plans_input. audit-impl splits on commas
      and audits each plan file.
      implementation_ref is context.integration_branch (no worktree remains).
      GO → create_review_pr. NO GO → remediate (re-enters plan with remediation file).

  remediate:
    action: route
    with:
      remediation_path: "${{ context.remediation_path }}"
    on_success: plan

  create_review_pr:
    tool: run_skill
    with:
      skill_command: "/autoskillit:create-review-pr ${{ context.integration_branch }} ${{ inputs.base_branch }} ${{ context.pr_order_file }} ${{ context.verdict }}"
      cwd: "${{ context.work_dir }}"
      step_name: "create_review_pr"
    capture:
      pr_url: "${{ result.pr_url }}"
    on_success: ci_watch_pr
    on_failure: cleanup_failure

  ci_watch_pr:
    tool: run_cmd
    with:
      cmd: |
        echo "Review PR: ${{ context.pr_url }}"
        run_id=""
        for i in 1 2 3 4 5 6; do
          run_id=$(gh run list \
            --branch "${{ context.integration_branch }}" \
            --limit 1 \
            --json databaseId,status \
            --jq '.[] | select(.status != "completed") | .databaseId' \
            2>/dev/null | head -1)
          [ -n "$run_id" ] && break
          sleep 5
        done
        [ -n "$run_id" ] || { echo "No active CI run found for branch ${{ context.integration_branch }}"; exit 1; }
        gh run watch "$run_id" --exit-status
      cwd: "${{ context.work_dir }}"
      timeout: 150
    on_success: confirm_cleanup
    on_failure: cleanup_failure
    note: >
      Polls for an active GitHub Actions run on context.integration_branch for up to 30 s,
      then watches until completion (timeout: 150 s). The integration branch is opened as a
      PR for human review — CI failures here indicate the integration branch has problems
      that the human reviewer should see. No automated remediation; on failure, the clone
      is preserved via cleanup_failure for manual inspection.

  confirm_cleanup:
    action: confirm
    message: >-
      PR-merge pipeline succeeded! The clone at ${{ context.work_dir }} is preserved.
      Delete it now? Keeping it lets you resume any session from this pipeline run.
      Type yes to delete or no to keep.
    on_success: delete_clone
    on_failure: done
    note: >-
      User confirmation gate — preserves clone by default. On yes: delete_clone removes it.
      On no: done is reached immediately, clone stays on disk.

  delete_clone:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "false"
      step_name: delete_clone
    on_success: done
    on_failure: done
    note: >-
      Reached only after user explicitly confirms cleanup. Sync-check hook gates deletion —
      removal approved only when branch is pushed.

  cleanup_failure:
    tool: remove_clone
    with:
      clone_path: "${{ context.work_dir }}"
      keep: "${{ inputs.keep_clone_on_failure }}"
    on_success: escalate_stop
    on_failure: escalate_stop
    note: >
      Called on pipeline failure. Respects keep_clone_on_failure ingredient.
      When keep=false, the sync-check hook gates deletion. Always routes
      to escalate_stop.

  done:
    action: stop
    message: "PR consolidation complete. Batch branch pushed, review PR opened targeting integration branch. Human review required before merging integration into main."

  escalate_stop:
    action: stop
    message: "Pipeline failed — human intervention needed. Check the integration branch and temp/pr-merge-pipeline/ for details."
    note: >
      context.task may be null when reached via escalation_required=true from merge_pr
      (merge-pr does not set conflict_report_path on escalation paths). Do not rely on
      context.task being populated when handling this stop.
