name: smoke-test
autoskillit_version: "0.3.0"
description: End-to-end smoke test exercising the full orchestration path — script loading, step routing, tool dispatch, capture/context threading, retry logic, bugfix loop, and merge.
summary: setup > seed_task > set_feature_branch > create_branch? > investigate > rectify > implement > set_worktree_path > test > merge > check_summary > create_summary? > done (assess/classify loop on failure)

ingredients:
  workspace:
    description: Absolute path to temp workspace directory (must be a git repo with initial commit)
    required: true
  base_branch:
    description: Branch to merge into (overridden to feature branch when collect_on_branch is true)
    default: "main"
  collect_on_branch:
    description: Collect all fixes on a feature branch and create issue+PR at end (true/false)
    default: "true"
  original_base_branch:
    description: The original base branch for PR target (set automatically from base_branch when collect_on_branch is true)
    default: "main"

kitchen_rules:
  - "NEVER use native Claude Code tools (Read, Grep, Glob, Edit, Write,
    Bash, Task, Explore, WebFetch, WebSearch, NotebookEdit) from the
    orchestrator. All work is delegated through run_skill/run_skill_retry."
  - "Route to on_failure — never investigate or fix directly from the orchestrator."

steps:
  setup:
    tool: run_cmd
    with:
      cmd: "git init -b main && git commit --allow-empty -m 'initial' && touch .autoskillit-workspace"
      cwd: "${{ inputs.workspace }}"
    on_success: seed_task
    on_failure: escalate

  seed_task:
    tool: run_cmd
    with:
      cmd: "echo 'Create ok.txt with content OK' > task.txt"
      cwd: "${{ inputs.workspace }}"
    on_success: set_feature_branch
    on_failure: escalate

  set_feature_branch:
    tool: run_cmd
    with:
      cmd: "printf '%s' '${{ inputs.base_branch }}'"
      cwd: "${{ inputs.workspace }}"
    capture:
      feature_branch: "${{ result.stdout }}"
    on_success: create_branch
    on_failure: escalate
    note: >
      Unconditionally sets feature_branch to inputs.base_branch as the default.
      When collect_on_branch=true, the subsequent create_branch step overrides
      feature_branch by capturing the newly-created branch name. When
      collect_on_branch=false, create_branch is skipped and this default stands.
      This eliminates the undefined-context-variable gap in the merge step.

  create_branch:
    tool: run_cmd
    with:
      cmd: >-
        BRANCH="autoskillit-smoke-$(date +%s)" &&
        git checkout -b "$BRANCH" &&
        echo '[]' > bug_report.json &&
        printf '%s' "$BRANCH"
      cwd: ${{ inputs.workspace }}
    capture:
      feature_branch: "${{ result.stdout }}"
    on_success: investigate
    on_failure: escalate
    optional: true
    skip_when_false: "inputs.collect_on_branch"
    note: >
      Only execute if inputs.collect_on_branch is 'true'. Otherwise skip to investigate.
      Creates the feature branch, initialises bug_report.json, and overrides
      context.feature_branch (set to inputs.base_branch by set_feature_branch) with
      the newly-created branch name for use by the merge step.

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:smoke-task Create investigation.txt in the current directory with the text 'No critical issues found.' Then output exactly this line on its own: investigation_path=investigation.txt"
      cwd: "${{ inputs.workspace }}"
    on_success: rectify
    on_failure: escalate

  rectify:
    tool: run_skill
    with:
      skill_command: "/autoskillit:smoke-task Create plan.md in the current directory at ${{ inputs.workspace }}/plan.md. The file MUST have this exact first line: Dry-walkthrough verified = TRUE followed by a blank line, then # Plan and Create ok.txt with content OK."
      cwd: "${{ inputs.workspace }}"
    on_success: implement
    on_failure: escalate

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:smoke-task In the git repo at ${{ inputs.workspace }}, run: git worktree add ${{ inputs.workspace }}/.claude/worktrees/smoke-impl -b smoke-impl. Then in that worktree directory, write ok.txt with content OK. Run git add ok.txt && git commit -m 'smoke: add ok.txt'."
      cwd: "${{ inputs.workspace }}"
    on_success: set_worktree_path
    on_failure: escalate
    retry:
      max_attempts: 2
      on: needs_retry
      on_exhausted: escalate

  set_worktree_path:
    tool: run_cmd
    with:
      cmd: "printf '%s' '${{ inputs.workspace }}/.claude/worktrees/smoke-impl'"
      cwd: "${{ inputs.workspace }}"
    capture:
      worktree_path: "${{ result.stdout }}"
    on_success: test
    on_failure: escalate

  test:
    tool: test_check
    with:
      worktree_path: "${{ context.worktree_path }}"
    on_success: merge
    on_failure: assess

  assess:
    tool: run_skill
    with:
      skill_command: "/autoskillit:smoke-task In the git worktree at ${{ context.worktree_path }}, check what file is expected by the test and create/fix it. Commit any changes. After fixing, append a JSON object to ${{ inputs.workspace }}/bug_report.json with keys: step (string 'test'), error (what failed), fix (what you did), iteration (number). The file contains a JSON array — read it, append your entry, write it back. Then output: fixed=true"
      cwd: "${{ context.worktree_path }}"
    on_success: test
    on_failure: classify
    retry:
      max_attempts: 2
      on: needs_retry
      on_exhausted: classify

  classify:
    tool: classify_fix
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ inputs.base_branch }}"
    on_result:
      - when: "${{ result.restart_scope }} == full_restart"
        route: investigate
      - when: "result.error"
        route: escalate
      - route: implement

  merge:
    tool: merge_worktree
    with:
      worktree_path: "${{ context.worktree_path }}"
      base_branch: "${{ context.feature_branch }}"
    capture:
      cleanup_succeeded: "${{ result.cleanup_succeeded }}"
    on_success: check_summary
    on_failure: escalate

  check_summary:
    python: autoskillit.smoke_utils.check_bug_report_non_empty
    with:
      workspace: ${{ inputs.workspace }}
    on_result:
      - when: "${{ result.non_empty }} == true"
        route: create_summary
      - route: done
    note: >
      Only execute if inputs.collect_on_branch is 'true'. Otherwise skip to done.
      Reads bug_report.json from the workspace. Routes to create_summary when bugs
      were fixed during the run (non_empty=true), otherwise routes to done.

  create_summary:
    tool: run_skill
    with:
      skill_command: "/autoskillit:pipeline-summary ${{ inputs.workspace }}/bug_report.json ${{ context.feature_branch }} ${{ inputs.original_base_branch }} ${{ inputs.workspace }}"
      cwd: "${{ inputs.workspace }}"
    on_success: done
    on_failure: escalate
    optional: true
    skip_when_false: "inputs.collect_on_branch"
    note: >
      Skipped when collect_on_branch is 'false' or no bugs were encountered.
      Terminal reporting step — outputs (summary file, issue URL, PR URL) are written to
      disk for human use and do not flow into subsequent pipeline steps.
      The feature branch name passed here should be the actual branch name created
      in create_branch (the agent tracks this). The skill gracefully handles
      missing gh CLI by writing a local summary only.

  done:
    action: stop
    message: "Smoke pipeline completed successfully."

  escalate:
    action: stop
    message: "Smoke pipeline failed — check step output for details."
