version: "0.1.0"
skills:
  assess-and-merge:
    inputs:
      - name: worktree_path
        type: directory_path
        required: true
      - name: plan_path
        type: file_path
        required: true
      - name: base_branch
        type: string
        required: true
    outputs:
      - name: merged_branch
        type: string

  dry-walkthrough:
    inputs:
      - name: plan_path
        type: file_path
        required: true
    outputs:
      - name: verified_plan_path
        type: file_path

  implement-worktree:
    inputs:
      - name: plan_path
        type: file_path
        required: true
    outputs:
      - name: worktree_path
        type: directory_path

  implement-worktree-no-merge:
    inputs:
      - name: plan_path
        type: file_path
        required: true
    outputs:
      - name: worktree_path
        type: directory_path

  investigate:
    inputs:
      - name: topic
        type: string
        required: true
    outputs:
      - name: investigation_path
        type: file_path

  make-groups:
    inputs:
      - name: source_doc
        type: file_path
        required: true
    outputs:
      - name: groups_path
        type: file_path
      - name: manifest_path
        type: file_path

  make-plan:
    inputs:
      - name: task
        type: string
        required: true
    outputs:
      - name: plan_path
        type: file_path

  write-recipe:
    inputs: []
    outputs:
      - name: recipe_path
        type: file_path

  mermaid:
    inputs: []
    outputs: []

  pipeline-summary:
    inputs:
      - name: bug_report_path
        type: file_path
        required: true
      - name: feature_branch
        type: string
        required: true
      - name: target_branch
        type: string
        required: true
      - name: workspace
        type: directory_path
        required: true
    outputs:
      - name: summary_path
        type: file_path
      - name: issue_url
        type: string
      - name: pr_url
        type: string

  rectify:
    inputs:
      - name: investigation_path
        type: file_path
        required: false
    outputs:
      - name: plan_path
        type: file_path

  retry-worktree:
    inputs:
      - name: plan_path
        type: file_path
        required: true
      - name: worktree_path
        type: directory_path
        required: true
    outputs:
      - name: worktree_path
        type: directory_path

  review-approach:
    inputs:
      - name: plan_path
        type: file_path
        required: false
    outputs:
      - name: review_path
        type: file_path

  setup-project:
    inputs:
      - name: project_dir
        type: directory_path
        required: true
    outputs:
      - name: analysis_path
        type: file_path
      - name: config_path
        type: file_path
