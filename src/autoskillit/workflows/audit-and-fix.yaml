name: audit-and-fix
description: Audit codebase, investigate findings, plan fixes, and implement.

constraints:
  - "During pipeline execution, only use AutoSkillit MCP tools. Native tools
    (Read, Grep, Glob, Edit, Write, Bash) are not available in this context —
    all code changes and investigation happen through headless sessions via
    run_skill/run_skill_retry, which have full tool access."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    assess-and-merge) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."

inputs:
  work_dir:
    description: Working directory for agent sessions
    required: true
  audit_type:
    description: Type of audit to run (arch, tests, cohesion, defense-standards)
    default: arch

steps:
  audit:
    tool: run_skill
    with:
      skill_command: "/audit-${{ inputs.audit_type }}"
      cwd: ${{ inputs.work_dir }}
    on_success: investigate
    on_failure: escalate

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the audit findings"
      cwd: ${{ inputs.work_dir }}
    on_success: plan
    on_failure: escalate

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify the investigation"
      cwd: ${{ inputs.work_dir }}
    on_success: implement
    on_failure: escalate

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree the plan"
      cwd: ${{ inputs.work_dir }}
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: escalate
    on_success: done
    on_failure: escalate

  done:
    action: stop
    message: "Audit findings addressed. Changes ready for review."

  escalate:
    action: stop
    message: "Human intervention needed."
