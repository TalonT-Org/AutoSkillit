name: bugfix-loop
description: End-to-end test with automatic bug fixing in isolated worktrees.

constraints:
  - "During pipeline execution, only use AutoSkillit MCP tools. Native tools
    (Read, Grep, Glob, Edit, Write, Bash) are not available in this context —
    all code changes and investigation happen through headless sessions via
    run_skill/run_skill_retry, which have full tool access."
  - "Route to on_failure when a step fails — the downstream skill (e.g.,
    assess-and-merge) has diagnostic access that the orchestrator does not.
    Do not investigate or attempt to fix failures directly."

inputs:
  test_dir:
    description: Directory containing the project to test
    required: true
  base_branch:
    description: Branch to merge fixes into
    default: main
  helper_dir:
    description: Directory for helper agent sessions
    required: true

steps:
  reset:
    tool: reset_test_dir
    with:
      test_dir: ${{ inputs.test_dir }}
    on_success: test
    on_failure: escalate

  test:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: done
    on_failure: investigate

  investigate:
    tool: run_skill
    with:
      skill_command: "/autoskillit:investigate the test failures"
      cwd: ${{ inputs.helper_dir }}
    on_success: plan
    on_failure: escalate

  plan:
    tool: run_skill
    with:
      skill_command: "/autoskillit:rectify the investigation findings"
      cwd: ${{ inputs.helper_dir }}
    on_success: implement
    on_failure: escalate

  implement:
    tool: run_skill_retry
    with:
      skill_command: "/autoskillit:implement-worktree-no-merge the plan"
      cwd: ${{ inputs.helper_dir }}
    retry:
      max_attempts: 3
      on: needs_retry
      on_exhausted: escalate
    on_success: verify
    on_failure: escalate

  verify:
    tool: test_check
    with:
      worktree_path: ${{ inputs.test_dir }}
    on_success: merge
    on_failure: assess

  assess:
    tool: run_skill
    with:
      skill_command: "/autoskillit:assess-and-merge fix test failures"
      cwd: ${{ inputs.helper_dir }}
    on_success: verify
    on_failure: classify

  classify:
    tool: classify_fix
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    on_result:
      field: restart_scope
      routes:
        full_restart: investigate
        partial_restart: implement
    on_failure: escalate

  merge:
    tool: merge_worktree
    with:
      worktree_path: ${{ inputs.test_dir }}
      base_branch: ${{ inputs.base_branch }}
    on_success: done
    on_failure: escalate

  done:
    action: stop
    message: "All tests passing. Fix merged successfully."

  escalate:
    action: stop
    message: "Human intervention needed. Review the latest output for details."
